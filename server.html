<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server 724 Tracker</title>
<style>
  /* === Page-specific styles (login, tabs, search, compare, movements) === */

  /* Login */
  #login-gate {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60vh;
  }
  .login-box {
    background: var(--bg-panel);
    border: 1px solid rgba(255,153,51,0.12);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    max-width: 360px;
    width: 100%;
  }
  .login-box h2 {
    font-family: 'Orbitron', sans-serif;
    color: var(--text-bright);
    font-size: 1.3rem;
    margin-bottom: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .login-box input {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-input);
    border: 1px solid rgba(255,153,51,0.12);
    border-radius: 6px;
    color: var(--text-bright);
    font-size: 1rem;
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 14px;
  }
  .login-box input:focus {
    outline: none;
    border-color: var(--lcars-orange);
  }
  .login-box button {
    width: 100%;
    padding: 10px;
    background: var(--lcars-orange);
    color: var(--bg-deep);
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .login-box button:hover { background: var(--lcars-gold); }
  .login-error {
    color: var(--lcars-red);
    font-size: 0.85rem;
    font-family: 'Share Tech Mono', monospace;
    margin-top: 10px;
    min-height: 1.2em;
  }

  /* Tabs */
  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .tab-btn {
    background: rgba(255,153,51,0.06);
    border: 1px solid rgba(255,153,51,0.12);
    color: var(--lcars-gold);
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    font-family: 'Rajdhani', sans-serif;
    transition: all 0.15s;
  }
  .tab-btn:hover {
    border-color: var(--lcars-orange);
    color: var(--lcars-orange);
  }
  .tab-btn.active {
    background: var(--lcars-orange);
    color: var(--bg-deep);
    border-color: var(--lcars-orange);
    font-weight: 700;
  }

  /* Recruiting filter controls */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
    justify-content: center;
    align-items: center;
  }
  .filter-toggle {
    background: rgba(255,153,51,0.06);
    border: 1px solid rgba(255,153,51,0.12);
    color: var(--lcars-gold);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.82rem;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    transition: all 0.15s;
  }
  .filter-toggle:hover {
    border-color: var(--lcars-orange);
    color: var(--lcars-orange);
  }
  .filter-toggle.active {
    background: var(--lcars-orange);
    color: var(--bg-deep);
    border-color: var(--lcars-orange);
    font-weight: 700;
  }
  .filter-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    color: var(--text-mid);
    font-family: 'Rajdhani', sans-serif;
  }
  .filter-input-wrap input {
    width: 80px;
    padding: 5px 10px;
    background: var(--bg-input);
    border: 1px solid rgba(255,153,51,0.12);
    border-radius: 4px;
    color: var(--text-bright);
    font-size: 0.85rem;
    font-family: 'Share Tech Mono', monospace;
  }
  .filter-input-wrap input:focus {
    outline: none;
    border-color: var(--lcars-orange);
  }

  /* Recruit score badges */
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    font-family: 'Share Tech Mono', monospace;
  }
  .badge-hot  { background: rgba(255,85,85,0.15); color: var(--lcars-red); border: 1px solid rgba(255,85,85,0.3); }
  .badge-warm { background: rgba(255,153,51,0.15); color: var(--lcars-orange); border: 1px solid rgba(255,153,51,0.3); }
  .badge-cool { background: rgba(85,204,85,0.15); color: var(--lcars-green); border: 1px solid rgba(85,204,85,0.3); }
  .badge-cold { background: rgba(153,153,255,0.15); color: var(--lcars-blue); border: 1px solid rgba(153,153,255,0.3); }

  .result-count {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 8px;
  }

  /* Search input */
  .search-wrap {
    margin-bottom: 20px;
    text-align: center;
  }
  .search-input {
    width: 100%;
    max-width: 500px;
    padding: 10px 16px;
    background: var(--bg-input);
    border: 1px solid rgba(255,153,51,0.12);
    border-radius: 8px;
    color: var(--text-bright);
    font-size: 1rem;
    font-family: 'Share Tech Mono', monospace;
  }
  .search-input:focus {
    outline: none;
    border-color: var(--lcars-orange);
  }
  .search-hint {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* Alliance selector */
  .selector-wrap {
    margin-bottom: 20px;
  }
  .selector-wrap select {
    padding: 8px 14px;
    background: var(--bg-input);
    border: 1px solid rgba(255,153,51,0.12);
    border-radius: 6px;
    color: var(--text-bright);
    font-size: 0.95rem;
    font-family: 'Share Tech Mono', monospace;
    min-width: 200px;
  }
  .selector-wrap select:focus {
    outline: none;
    border-color: var(--lcars-orange);
  }
  .selector-wrap label {
    color: var(--text-mid);
    font-size: 0.85rem;
    margin-right: 8px;
  }

  /* Alliance search dropdown */
  .alliance-search-wrap {
    position: relative;
    max-width: 500px;
    margin: 0 auto 20px;
  }
  .alliance-search-input {
    width: 100%;
    padding: 10px 16px;
    background: var(--bg-input);
    border: 1px solid rgba(255,153,51,0.12);
    border-radius: 8px;
    color: var(--text-bright);
    font-size: 1rem;
    font-family: 'Share Tech Mono', monospace;
  }
  .alliance-search-input:focus {
    outline: none;
    border-color: var(--lcars-orange);
  }
  .alliance-search-hint {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: center;
  }
  .alliance-search-results {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--bg-card);
    border: 1px solid rgba(255,153,51,0.12);
    border-top: none;
    border-radius: 0 0 8px 8px;
    max-height: 320px;
    overflow-y: auto;
    z-index: 100;
  }
  .alliance-search-results:empty {
    display: none;
  }
  .alliance-search-item {
    padding: 10px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,153,51,0.06);
    transition: background 0.1s;
  }
  .alliance-search-item:last-child { border-bottom: none; }
  .alliance-search-item:hover,
  .alliance-search-item.highlighted {
    background: var(--lcars-orange);
    color: var(--bg-deep);
  }
  .alliance-search-item:hover .tag,
  .alliance-search-item.highlighted .tag {
    color: var(--bg-deep);
  }
  .alliance-search-item:hover .meta,
  .alliance-search-item.highlighted .meta {
    color: var(--bg-panel);
  }
  .alliance-search-item .tag {
    color: var(--lcars-orange);
    font-weight: 600;
    font-size: 0.95rem;
  }
  .alliance-search-item .meta {
    color: var(--text-dim);
    font-size: 0.8rem;
  }
  .alliance-search-no-results {
    padding: 12px 16px;
    color: var(--text-dim);
    font-size: 0.85rem;
    font-style: italic;
  }

  /* Comparison layout */
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .compare-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,153,51,0.06);
  }
  .compare-row:last-child { border-bottom: none; }
  .compare-label {
    width: 140px;
    font-size: 0.78rem;
    text-transform: uppercase;
    color: var(--text-mid);
    letter-spacing: 0.8px;
    flex-shrink: 0;
  }
  .compare-bars {
    flex: 1;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .compare-bar {
    height: 22px;
    border-radius: 4px;
    transition: width 0.3s;
    min-width: 2px;
  }
  .compare-val {
    font-size: 0.85rem;
    min-width: 70px;
    font-variant-numeric: tabular-nums;
  }
  .compare-val-left { text-align: right; }

  /* Movement section headers */
  .section-header {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    color: var(--lcars-orange);
    font-weight: 700;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,153,51,0.1);
    margin-bottom: 16px;
    margin-top: 24px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .section-header:first-child { margin-top: 0; }

  /* Home alliance row highlight */
  tr.home-row td { background: rgba(255,153,51,0.06); }

  /* Clickable rows */
  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background: rgba(255,153,51,0.06); }

  .empty {
    color: var(--text-dim);
    font-style: italic;
    padding: 20px 0;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
  }

  @media (max-width: 600px) {
    .compare-grid { grid-template-columns: 1fr; }
  }
</style>
<link rel="stylesheet" href="lcars.css">
</head>
<body>

<div class="lcars-bar">
  <div class="lcars-cap"></div>
  <div class="lcars-title-block">
    <h1>Server 724</h1>
    <span class="subtitle">ALLIANCE ANALYTICS</span>
  </div>
  <div class="lcars-end"></div>
</div>

<div class="lcars-layout">
  <div class="lcars-sidebar">
    <div class="seg seg-orange" style="height:80px"></div>
    <div class="seg seg-amber" style="height:40px"></div>
    <div class="seg seg-blue" style="height:60px"></div>
    <div class="seg seg-purple" style="height:30px"></div>
    <div class="seg seg-teal" style="height:50px"></div>
    <div class="seg seg-amber"></div>
  </div>
  <div class="lcars-main">
    <nav>
      <a href="index">NWS</a>
      <a href="calendar">Calendar</a>
      <a href="server" class="active">Server 724 Tracker</a>
    </nav>

    <div class="updated" id="updated"></div>

    <div id="content">
      <div class="loading">Loading server data...</div>
    </div>

    <footer id="footer-el">
      Data sourced from Scopely game APIs
    </footer>
  </div>
</div>

<script>
(function() {
  const $ = id => document.getElementById(id);
  const HOME_ALLIANCE_ID = '2696744443654333349';

  loadData();

  // --- Utilities ---
  function esc(s) {
    const el = document.createElement('span');
    el.textContent = s == null ? '' : String(s);
    return el.innerHTML;
  }

  function formatAbbr(n) {
    if (n == null) n = 0;
    if (n === 0) return '0';
    const abs = Math.abs(n);
    const sign = n < 0 ? '-' : '';
    let val, suf;
    if (abs >= 1e15)      { val = abs / 1e15; suf = 'Q'; }
    else if (abs >= 1e12) { val = abs / 1e12; suf = 'T'; }
    else if (abs >= 1e9)  { val = abs / 1e9;  suf = 'B'; }
    else if (abs >= 1e6)  { val = abs / 1e6;  suf = 'M'; }
    else if (abs >= 1e3)  { val = abs / 1e3;  suf = 'K'; }
    else                  { val = abs;         suf = '';  }
    return sign + val.toFixed(2).replace(/\.?0+$/, '') + suf;
  }

  function formatDelta(n) {
    if (n === 0) return '<span class="delta-zero">0</span>';
    const cls = n > 0 ? 'delta-pos' : 'delta-neg';
    const sign = n > 0 ? '+' : '';
    return `<span class="${cls}">${sign}${formatAbbr(n)}</span>`;
  }

  function formatNum(n) {
    if (n == null) return '0';
    return Number(n).toLocaleString();
  }

  function playerLink(p) {
    return `<a class="player-link" href="player?id=${encodeURIComponent(p.id)}">${esc(p.name)}</a>`;
  }

  function activityBadge(score) {
    if (score == null) return '';
    let label, color, bg;
    if (score >= 76)      { label = 'Very Active'; color = '#34d399'; bg = '#0d946822'; }
    else if (score >= 56) { label = 'Active';      color = '#60a5fa'; bg = '#1d4ed822'; }
    else if (score >= 36) { label = 'Moderate';    color = '#fbbf24'; bg = '#78350f44'; }
    else if (score >= 16) { label = 'Low';         color = '#fb923c'; bg = '#d9770644'; }
    else                  { label = 'Inactive';    color = '#f87171'; bg = '#dc262622'; }
    return `<span style="display:inline-block;padding:2px 6px;border-radius:4px;font-size:0.72rem;font-weight:600;background:${bg};color:${color}">${score}</span> <span style="font-size:0.72rem;color:${color}">${label}</span>`;
  }

  // --- Data ---
  let allianceData = null; // server_alliances.json
  let playerData = null;   // server_players.json
  let currentTab = 'leaderboard';
  let detailAllianceId = null;

  // Sort state per tab
  let lbSortCol = 'total_power';
  let lbSortAsc = false;
  let lbPeriod = 0; // 0 = current (no delta), 1/7/30 = days
  let detailSortCol = 'power';
  let detailSortAsc = false;
  let detailPeriod = null; // null = all time, 1/7/30 = days

  // Player Leaderboard state
  let plbSortCol = 'power';
  let plbSortAsc = false;
  let plbPeriod = 7;
  let plbSearch = '';

  // Recruiting state
  let recSortCol = 'recruit_score';
  let recSortAsc = false;
  let recPeriod = 7;
  let recSearch = '';
  let recFilters = {
    noAlliance: false,
    smallAlliance: false,
    recentlyMoved: false,
    highActivity: false,
    highLevel: false,
  };
  let recMinPower = 0;
  let recMinLevel = 25;

  // Precomputed (populated after loadData)
  let allianceMemberCounts = {};
  let allianceAvgActivity = {};
  let avgActivityScore = 0;

  const DELTA_FIELDS = [
    'level', 'power', 'helps', 'iso_contrib',
    'players_killed', 'hostiles_killed', 'resources_mined', 'resources_raided',
  ];

  // Gain-focused cell: delta as main value, current total as subtitle
  function gainCellHtml(current, delta) {
    if (delta === 0) {
      return `<span class="cell-delta-main delta-zero">0</span><span class="cell-sub">${formatAbbr(current)}</span>`;
    }
    const cls = delta > 0 ? 'delta-pos' : 'delta-neg';
    const sign = delta > 0 ? '+' : '';
    return `<span class="cell-delta-main ${cls}">${sign}${formatAbbr(delta)}</span><span class="cell-sub">${formatAbbr(current)}</span>`;
  }

  function loadData() {
    const t = Date.now();
    const ap = fetch('data/server_alliances.json?t=' + t)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
    const pp = fetch('data/server_players.json?t=' + t)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });

    Promise.all([ap, pp])
      .then(([a, p]) => {
        allianceData = a;
        playerData = p;
        const d = new Date(a.pulled_at);
        $('updated').textContent = 'Last updated: ' + d.toLocaleDateString('en-US', {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        precompute();
        // Deep-link: ?alliance=<id> opens alliance detail tab
        const params = new URLSearchParams(window.location.search);
        const urlAllianceId = params.get('alliance');
        if (urlAllianceId && a.alliances.some(al => al.alliance_id === urlAllianceId)) {
          detailAllianceId = urlAllianceId;
          currentTab = 'detail';
        }
        const urlTab = params.get('tab');
        const validTabs = ['leaderboard','players','detail','search','compare','recruiting','movements'];
        if (urlTab && validTabs.includes(urlTab)) {
          currentTab = urlTab;
        }
        renderPage();
      })
      .catch(err => {
        $('content').innerHTML = `<div class="loading error">Failed to load data: ${esc(err.message)}<br>Run pull_api.py to generate server JSON files.</div>`;
      });
  }

  function renderPage() {
    let html = '';

    // Tab bar
    const tabs = [
      ['leaderboard', 'Alliance Leaderboard'],
      ['players', 'Player Leaderboard'],
      ['detail', 'Alliance Detail'],
      ['search', 'Player Search'],
      ['compare', 'Alliance Comparison'],
      ['recruiting', 'Recruiting Board'],
      ['movements', 'Player Movements'],
    ];
    html += '<div class="tab-bar">';
    for (const [id, label] of tabs) {
      const cls = currentTab === id ? ' active' : '';
      html += `<button class="tab-btn${cls}" data-tab="${id}">${label}</button>`;
    }
    html += '</div>';

    html += '<div id="tab-content"></div>';
    $('content').innerHTML = html;

    // Attach tab handlers
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentTab = btn.dataset.tab;
        renderPage();
      });
    });

    renderTab();
  }

  function renderTab() {
    const el = document.getElementById('tab-content');
    if (!el) return;

    switch (currentTab) {
      case 'leaderboard': el.innerHTML = renderLeaderboard();       attachLeaderboardHandlers(); break;
      case 'players':     el.innerHTML = renderPlayerLeaderboard(); attachPlayerLeaderboardHandlers(); break;
      case 'detail':      el.innerHTML = renderDetail();            attachDetailHandlers(); break;
      case 'search':      el.innerHTML = renderSearch();            attachSearchHandlers(); break;
      case 'compare':     el.innerHTML = renderCompare();           attachCompareHandlers(); break;
      case 'recruiting':  el.innerHTML = renderRecruiting();        attachRecruitingHandlers(); break;
      case 'movements':   el.innerHTML = renderMovements();         break;
    }
  }

  function precompute() {
    allianceMemberCounts = {};
    for (const p of playerData.players) {
      if (p.alliance_tag) {
        allianceMemberCounts[p.alliance_tag] = (allianceMemberCounts[p.alliance_tag] || 0) + 1;
      }
    }
    allianceAvgActivity = {};
    const sums = {}, counts = {};
    for (const p of playerData.players) {
      if (p.alliance_tag) {
        const a = p.activity_score || 0;
        sums[p.alliance_tag] = (sums[p.alliance_tag] || 0) + a;
        counts[p.alliance_tag] = (counts[p.alliance_tag] || 0) + 1;
      }
    }
    for (const tag in sums) allianceAvgActivity[tag] = sums[tag] / counts[tag];
    let total = 0, n = 0;
    for (const p of playerData.players) {
      const a = p.activity_score || 0;
      if (a > 0) { total += a; n++; }
    }
    avgActivityScore = n > 0 ? total / n : 0;
  }

  // ===== TAB 1: Alliance Leaderboard =====
  function renderLeaderboard() {
    const alliances = [...allianceData.alliances];

    const cols = [
      { key: 'rank',               label: 'Rank' },
      { key: 'alliance_tag',       label: 'Tag' },
      { key: 'member_count',       label: 'Members',       delta: true },
      { key: 'avg_level',          label: 'Avg Level',     delta: true },
      { key: 'avg_activity_score', label: 'Activity' },
      { key: 'total_power',        label: 'Total Power',   delta: true },
      { key: 'total_pvp',          label: 'PVP Kills',     delta: true },
      { key: 'total_hk',           label: 'Hostile Kills',  delta: true },
      { key: 'total_mined',        label: 'RSS Mined',     delta: true },
      { key: 'total_raided',       label: 'RSS Raided',    delta: true },
    ];

    // Sort — use delta value for delta-enabled columns when a period is active
    const sortDef = cols.find(c => c.key === lbSortCol);
    if (sortDef) {
      if (lbSortCol === 'alliance_tag') {
        alliances.sort((a, b) => {
          const v = (a.alliance_tag || '').localeCompare(b.alliance_tag || '');
          return lbSortAsc ? v : -v;
        });
      } else {
        const useDelta = sortDef.delta && lbPeriod;
        const sortKey = useDelta ? `${lbSortCol}_delta_${lbPeriod}d` : lbSortCol;
        alliances.sort((a, b) => {
          const v = (a[sortKey] || 0) - (b[sortKey] || 0);
          return lbSortAsc ? v : -v;
        });
      }
    }

    // Summary cards
    let html = '<div class="cards">';
    html += `<div class="card"><div class="label">Alliances</div><div class="value">${allianceData.alliance_count}</div></div>`;
    html += `<div class="card"><div class="label">Total Players</div><div class="value">${playerData.player_count}</div></div>`;
    html += `<div class="card"><div class="label">As Of</div><div class="value">${esc(allianceData.as_of_date)}</div></div>`;
    if (lbPeriod && allianceData.delta_dates) {
      const baseDate = allianceData.delta_dates[`${lbPeriod}d`];
      if (baseDate) html += `<div class="card"><div class="label">Delta Base</div><div class="value">${esc(baseDate)}</div></div>`;
    }
    html += '</div>';

    // Period selector
    html += '<div class="period-bar">';
    for (const [p, label] of [[0, 'Current'], [1, 'Yesterday'], [7, 'This Week'], [30, 'This Month']]) {
      const active = lbPeriod === p ? ' active' : '';
      html += `<button class="lb-period-btn period-btn${active}" data-period="${p}">${label}</button>`;
    }
    html += '</div>';

    // Table
    html += '<div class="table-wrap"><table><thead><tr>';
    for (const col of cols) {
      const arrow = lbSortCol === col.key ? (lbSortAsc ? '&#9650;' : '&#9660;') : '';
      html += `<th data-col="${col.key}">${col.label}<span class="arrow">${arrow}</span></th>`;
    }
    html += '</tr></thead><tbody>';

    for (const a of alliances) {
      const isHome = a.alliance_id === HOME_ALLIANCE_ID;
      const rowCls = (isHome ? ' home-row' : '') + ' clickable';
      html += `<tr class="${rowCls.trim()}" data-aid="${a.alliance_id}">`;
      html += `<td>${a.rank}</td>`;
      html += `<td><strong>${esc(a.alliance_tag)}</strong></td>`;
      for (const col of cols.slice(2)) {
        const val = a[col.key] || 0;
        if (col.key === 'avg_activity_score') {
          html += `<td>${activityBadge(val)}</td>`;
        } else if (col.delta && lbPeriod) {
          const delta = a[`${col.key}_delta_${lbPeriod}d`] || 0;
          html += `<td>${gainCellHtml(val, delta)}</td>`;
        } else {
          html += `<td>${col.key === 'member_count' || col.key === 'avg_level' ? val : formatAbbr(val)}</td>`;
        }
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    return html;
  }

  function attachLeaderboardHandlers() {
    document.querySelectorAll('#tab-content th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (lbSortCol === col) lbSortAsc = !lbSortAsc;
        else { lbSortCol = col; lbSortAsc = col === 'alliance_tag'; }
        document.getElementById('tab-content').innerHTML = renderLeaderboard();
        attachLeaderboardHandlers();
      });
    });

    // Period selector
    document.querySelectorAll('.lb-period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        lbPeriod = parseInt(btn.dataset.period);
        document.getElementById('tab-content').innerHTML = renderLeaderboard();
        attachLeaderboardHandlers();
      });
    });

    // Click row → alliance detail
    document.querySelectorAll('#tab-content tr.clickable').forEach(tr => {
      tr.addEventListener('click', () => {
        detailAllianceId = tr.dataset.aid;
        currentTab = 'detail';
        renderPage();
      });
    });
  }

  // ===== TAB 2: Alliance Detail =====
  function getDeltaKey(field, days) {
    return `${field}_delta_${days}d`;
  }

  let allianceSearchQuery = '';
  let allianceSearchHighlight = -1;

  function renderDetail() {
    const alliances = allianceData.alliances;
    const selectedAlliance = detailAllianceId ? alliances.find(a => a.alliance_id === detailAllianceId) : null;

    // Search bar
    const displayValue = selectedAlliance ? `[${selectedAlliance.alliance_tag}]` : allianceSearchQuery;
    let html = '<div class="alliance-search-wrap">';
    html += `<input type="text" class="alliance-search-input" id="alliance-search" placeholder="Search alliances by tag..." value="${esc(displayValue)}" autocomplete="off">`;
    html += '<div id="alliance-search-dropdown" class="alliance-search-results"></div>';
    html += '</div>';
    if (!detailAllianceId) {
      html += `<div class="alliance-search-hint">Search across ${alliances.length} alliances on Server 724</div>`;
    }

    if (!detailAllianceId) {
      html += '<div class="empty">Search for an alliance to view details</div>';
      return html;
    }

    const info = alliances.find(a => a.alliance_id === detailAllianceId);
    const members = playerData.players.filter(p => p.alliance_id === detailAllianceId);

    if (!info) {
      html += '<div class="empty">Alliance not found</div>';
      return html;
    }

    // Summary cards — match homepage layout
    const statFields = ['helps', 'iso_contrib',
                        'players_killed', 'hostiles_killed', 'resources_mined', 'resources_raided'];
    const statLabels = {
      helps: 'Helps', iso_contrib: 'ISO Contrib', players_killed: 'PVP Kills',
      hostiles_killed: 'Hostile Kills', resources_mined: 'RSS Mined',
      resources_raided: 'RSS Raided',
    };

    function statDelta(field) {
      if (!detailPeriod) return '';
      const dt = members.reduce((s, p) => s + (p[getDeltaKey(field, detailPeriod)] || 0), 0);
      return `<div class="delta">${formatDelta(dt)}</div>`;
    }

    // Top row: key alliance info
    const totalPower = members.reduce((s, p) => s + (p.power || 0), 0);
    html += '<div class="cards">';
    html += `<div class="card"><div class="label">Total Power</div><div class="value">${formatAbbr(totalPower)}</div>${statDelta('power')}</div>`;
    html += `<div class="card"><div class="label">Members</div><div class="value">${info.member_count}</div></div>`;
    html += `<div class="card"><div class="label">Avg Level</div><div class="value">${info.avg_level}</div></div>`;
    html += `<div class="card"><div class="label">Max Level</div><div class="value">${info.max_level}</div></div>`;
    html += '</div>';

    // Bottom row: alliance stat totals
    html += '<div class="cards-label">Alliance Totals</div>';
    html += '<div class="cards">';
    for (const field of statFields) {
      const total = members.reduce((s, p) => s + (p[field] || 0), 0);
      html += `<div class="card"><div class="label">${statLabels[field]}</div><div class="value">${formatAbbr(total)}</div>${statDelta(field)}</div>`;
    }
    html += '</div>';

    // Period selector
    html += '<div class="period-bar">';
    const periods = [[null, 'All Time'], [1, 'Yesterday'], [7, 'This Week'], [30, 'This Month']];
    for (const [p, label] of periods) {
      const active = detailPeriod === p ? ' active' : '';
      html += `<button class="period-btn${active}" data-period="${p}">${label}</button>`;
    }
    html += '</div>';

    // Delta date info
    if (detailPeriod && playerData.delta_dates) {
      const baseDate = playerData.delta_dates[`${detailPeriod}d`];
      if (baseDate) {
        html += `<div style="text-align:center;font-size:0.78rem;color:var(--text-dim);margin-bottom:16px;">Comparing against ${baseDate}</div>`;
      }
    }

    // Column definitions
    const cols = [
      { key: 'name',             label: 'Name' },
      { key: 'level',            label: 'Level' },
      { key: 'activity_score',   label: 'Activity' },
      { key: 'power',            label: 'Power' },
      { key: 'helps',            label: 'Helps' },
      { key: 'iso_contrib',      label: 'ISO Contrib' },
      { key: 'players_killed',   label: 'PVP Kills' },
      { key: 'hostiles_killed',  label: 'Hostile Kills' },
      { key: 'resources_mined',  label: 'RSS Mined' },
      { key: 'resources_raided', label: 'RSS Raided' },
    ];

    // Sort — use delta values when a period is active
    const deltaFieldSet = new Set(DELTA_FIELDS);
    if (detailSortCol === 'name') {
      members.sort((a, b) => {
        const v = a.name.localeCompare(b.name);
        return detailSortAsc ? v : -v;
      });
    } else if (detailPeriod && deltaFieldSet.has(detailSortCol)) {
      const dk = getDeltaKey(detailSortCol, detailPeriod);
      members.sort((a, b) => {
        const v = (a[dk] || 0) - (b[dk] || 0);
        return detailSortAsc ? v : -v;
      });
    } else {
      members.sort((a, b) => {
        const v = (a[detailSortCol] || 0) - (b[detailSortCol] || 0);
        return detailSortAsc ? v : -v;
      });
    }

    html += '<div class="table-wrap"><table><thead><tr>';
    for (const col of cols) {
      const arrow = detailSortCol === col.key ? (detailSortAsc ? '&#9650;' : '&#9660;') : '';
      let label = col.label;
      if (detailPeriod && deltaFieldSet.has(col.key)) label += '<br>Gained';
      html += `<th data-col="${col.key}">${label}<span class="arrow">${arrow}</span></th>`;
    }
    html += '</tr></thead><tbody>';

    for (const p of members) {
      html += '<tr>';
      for (const col of cols) {
        if (col.key === 'name') {
          html += `<td>${playerLink(p)}</td>`;
        } else if (col.key === 'activity_score') {
          html += `<td>${activityBadge(p.activity_score)}</td>`;
        } else if (detailPeriod && deltaFieldSet.has(col.key)) {
          const delta = p[getDeltaKey(col.key, detailPeriod)] || 0;
          html += `<td>${gainCellHtml(p[col.key] || 0, delta)}</td>`;
        } else {
          html += `<td>${col.key === 'level' ? p[col.key] : formatAbbr(p[col.key] || 0)}</td>`;
        }
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    return html;
  }

  function attachDetailHandlers() {
    const input = document.getElementById('alliance-search');
    const dropdown = document.getElementById('alliance-search-dropdown');

    if (input && dropdown) {
      function showDropdown(query) {
        const q = query.toLowerCase().replace(/[\[\]]/g, '');
        if (q.length === 0) {
          dropdown.innerHTML = '';
          return;
        }
        const matches = allianceData.alliances.filter(a =>
          a.alliance_tag.toLowerCase().includes(q)
        ).slice(0, 20);

        if (matches.length === 0) {
          dropdown.innerHTML = '<div class="alliance-search-no-results">No alliances found</div>';
          allianceSearchHighlight = -1;
          return;
        }

        dropdown.innerHTML = matches.map((a, i) =>
          `<div class="alliance-search-item${i === allianceSearchHighlight ? ' highlighted' : ''}" data-aid="${a.alliance_id}">` +
          `<span class="tag">[${esc(a.alliance_tag)}]</span>` +
          `<span class="meta">${a.member_count} members &middot; ${formatAbbr(a.total_power)} power &middot; #${a.rank}</span>` +
          `</div>`
        ).join('');

        dropdown.querySelectorAll('.alliance-search-item').forEach(item => {
          item.addEventListener('click', () => {
            detailAllianceId = item.dataset.aid;
            allianceSearchQuery = '';
            allianceSearchHighlight = -1;
            document.getElementById('tab-content').innerHTML = renderDetail();
            attachDetailHandlers();
          });
        });
      }

      input.addEventListener('focus', () => {
        // If an alliance is selected, clear to allow new search
        if (detailAllianceId) {
          input.value = '';
          input.select();
        }
        if (input.value.length > 0) {
          showDropdown(input.value);
        }
      });

      input.addEventListener('input', () => {
        allianceSearchQuery = input.value;
        allianceSearchHighlight = -1;
        // Clear selection when typing
        if (detailAllianceId) {
          detailAllianceId = null;
        }
        showDropdown(input.value);
      });

      input.addEventListener('keydown', (e) => {
        const items = dropdown.querySelectorAll('.alliance-search-item');
        if (items.length === 0) return;

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          allianceSearchHighlight = Math.min(allianceSearchHighlight + 1, items.length - 1);
          items.forEach((el, i) => el.classList.toggle('highlighted', i === allianceSearchHighlight));
          items[allianceSearchHighlight]?.scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          allianceSearchHighlight = Math.max(allianceSearchHighlight - 1, 0);
          items.forEach((el, i) => el.classList.toggle('highlighted', i === allianceSearchHighlight));
          items[allianceSearchHighlight]?.scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'Enter' && allianceSearchHighlight >= 0) {
          e.preventDefault();
          const aid = items[allianceSearchHighlight]?.dataset.aid;
          if (aid) {
            detailAllianceId = aid;
            allianceSearchQuery = '';
            allianceSearchHighlight = -1;
            document.getElementById('tab-content').innerHTML = renderDetail();
            attachDetailHandlers();
          }
        } else if (e.key === 'Escape') {
          dropdown.innerHTML = '';
          allianceSearchHighlight = -1;
        }
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', function closeDropdown(e) {
        if (!e.target.closest('.alliance-search-wrap')) {
          dropdown.innerHTML = '';
          allianceSearchHighlight = -1;
        }
      });
    }

    document.querySelectorAll('#tab-content th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (detailSortCol === col) detailSortAsc = !detailSortAsc;
        else { detailSortCol = col; detailSortAsc = col === 'name'; }
        document.getElementById('tab-content').innerHTML = renderDetail();
        attachDetailHandlers();
      });
    });

    // Period button handlers
    document.querySelectorAll('#tab-content .period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const p = btn.dataset.period;
        detailPeriod = p === 'null' ? null : parseInt(p);
        document.getElementById('tab-content').innerHTML = renderDetail();
        attachDetailHandlers();
      });
    });
  }

  // ===== TAB 3: Player Search =====
  let searchQuery = '';

  function renderSearch() {
    let html = '<div class="search-wrap">';
    html += `<input type="text" class="search-input" id="search-input" placeholder="Search players by name..." value="${esc(searchQuery)}" autofocus>`;
    html += '<div class="search-hint">Type at least 2 characters to search across all ~' + playerData.player_count + ' players</div>';
    html += '</div>';

    if (searchQuery.length < 2) {
      return html;
    }

    const q = searchQuery.toLowerCase();
    const matches = playerData.players.filter(p => p.name.toLowerCase().includes(q));

    if (matches.length === 0) {
      html += '<div class="empty">No players found</div>';
      return html;
    }

    html += `<div style="text-align:center;font-size:0.85rem;color:var(--text-dim);margin-bottom:12px;">${matches.length} result${matches.length !== 1 ? 's' : ''}</div>`;

    html += '<div class="table-wrap"><table><thead><tr>';
    html += '<th>Name</th><th>Alliance</th><th>Level</th><th>Power</th><th>7d Delta</th>';
    html += '</tr></thead><tbody>';

    const shown = matches.slice(0, 100);
    for (const p of shown) {
      html += '<tr>';
      html += `<td>${playerLink(p)}</td>`;
      html += `<td>${esc(p.alliance_tag)}</td>`;
      html += `<td>${p.level}</td>`;
      html += `<td>${formatAbbr(p.power)}</td>`;
      html += `<td>${formatDelta(p.power_delta_7d || 0)}</td>`;
      html += '</tr>';
    }
    html += '</tbody></table></div>';

    if (matches.length > 100) {
      html += `<div class="empty">Showing first 100 of ${matches.length} results. Refine your search.</div>`;
    }

    return html;
  }

  function attachSearchHandlers() {
    const input = document.getElementById('search-input');
    if (input) {
      input.addEventListener('input', () => {
        searchQuery = input.value;
        // Re-render just the results, not the whole page
        const el = document.getElementById('tab-content');
        el.innerHTML = renderSearch();
        attachSearchHandlers();
        // Re-focus and restore cursor position
        const newInput = document.getElementById('search-input');
        if (newInput) {
          newInput.focus();
          newInput.setSelectionRange(newInput.value.length, newInput.value.length);
        }
      });
    }
  }

  // ===== TAB 4: Alliance Comparison =====
  let compareA = null;
  let compareB = null;

  function renderCompare() {
    const alliances = allianceData.alliances;

    let html = '<div class="compare-grid">';
    for (const [side, selected, label] of [['a', compareA, 'Alliance A'], ['b', compareB, 'Alliance B']]) {
      html += `<div class="selector-wrap"><label>${label}:</label>`;
      html += `<select id="compare-${side}">`;
      html += '<option value="">-- Select --</option>';
      for (const a of alliances) {
        const sel = a.alliance_id === selected ? ' selected' : '';
        html += `<option value="${a.alliance_id}"${sel}>[${esc(a.alliance_tag)}] ${formatAbbr(a.total_power)}</option>`;
      }
      html += '</select></div>';
    }
    html += '</div>';

    if (!compareA || !compareB) {
      html += '<div class="empty">Select two alliances to compare</div>';
      return html;
    }

    const a = alliances.find(x => x.alliance_id === compareA);
    const b = alliances.find(x => x.alliance_id === compareB);
    if (!a || !b) {
      html += '<div class="empty">Alliance not found</div>';
      return html;
    }

    const metrics = [
      { key: 'member_count', label: 'Members' },
      { key: 'avg_level',    label: 'Avg Level' },
      { key: 'max_level',    label: 'Max Level' },
      { key: 'total_power',  label: 'Total Power' },
      { key: 'power_delta_7d', label: '7d Power Delta' },
      { key: 'total_pvp',    label: 'PVP Kills' },
      { key: 'total_hk',     label: 'Hostile Kills' },
      { key: 'total_mined',  label: 'RSS Mined' },
      { key: 'total_raided', label: 'RSS Raided' },
    ];

    html += `<div style="display:flex;justify-content:space-between;margin-bottom:12px;">`;
    html += `<strong style="color:var(--lcars-teal);font-size:1.1rem;">[${esc(a.alliance_tag)}]</strong>`;
    html += `<strong style="color:var(--lcars-orange);font-size:1.1rem;">[${esc(b.alliance_tag)}]</strong>`;
    html += '</div>';

    for (const m of metrics) {
      const va = a[m.key] || 0;
      const vb = b[m.key] || 0;
      const maxVal = Math.max(Math.abs(va), Math.abs(vb), 1);
      const pctA = (Math.abs(va) / maxVal) * 100;
      const pctB = (Math.abs(vb) / maxVal) * 100;

      html += '<div class="compare-row">';
      html += `<div class="compare-label">${m.label}</div>`;
      html += '<div class="compare-bars" style="flex-direction:column;gap:4px;">';

      html += '<div style="display:flex;align-items:center;width:100%;gap:8px;">';
      html += `<span class="compare-val compare-val-left" style="color:var(--lcars-teal)">${formatAbbr(va)}</span>`;
      html += `<div style="flex:1;background:var(--bg-card);border-radius:4px;height:22px;position:relative;">`;
      html += `<div class="compare-bar" style="width:${pctA}%;background:var(--lcars-teal);position:absolute;left:0;top:0;"></div>`;
      html += `</div>`;
      html += '</div>';

      html += '<div style="display:flex;align-items:center;width:100%;gap:8px;">';
      html += `<span class="compare-val compare-val-left" style="color:var(--lcars-orange)">${formatAbbr(vb)}</span>`;
      html += `<div style="flex:1;background:var(--bg-card);border-radius:4px;height:22px;position:relative;">`;
      html += `<div class="compare-bar" style="width:${pctB}%;background:var(--lcars-orange);position:absolute;left:0;top:0;"></div>`;
      html += `</div>`;
      html += '</div>';

      html += '</div></div>';
    }

    return html;
  }

  function attachCompareHandlers() {
    const selA = document.getElementById('compare-a');
    const selB = document.getElementById('compare-b');
    if (selA) {
      selA.addEventListener('change', () => {
        compareA = selA.value || null;
        document.getElementById('tab-content').innerHTML = renderCompare();
        attachCompareHandlers();
      });
    }
    if (selB) {
      selB.addEventListener('change', () => {
        compareB = selB.value || null;
        document.getElementById('tab-content').innerHTML = renderCompare();
        attachCompareHandlers();
      });
    }
  }

  // ===== TAB 5: Player Movements =====
  function renderMovements() {
    const moved = playerData.players.filter(p => p.moved);

    if (moved.length === 0) {
      return '<div class="empty">No player movements detected in the last 7 days</div>';
    }

    // Split into home-alliance-related and other
    const homeMoves = moved.filter(p =>
      p.alliance_id === HOME_ALLIANCE_ID || (p.prev_alliance_tag && p.prev_alliance_tag === 'NWS')
    );
    const otherMoves = moved.filter(p =>
      p.alliance_id !== HOME_ALLIANCE_ID && (p.prev_alliance_tag !== 'NWS')
    );

    let html = '';

    function movementTable(players, title) {
      if (players.length === 0) return '';
      players.sort((a, b) => (b.moved_date || '').localeCompare(a.moved_date || ''));
      let s = `<div class="section-header">${title} (${players.length})</div>`;
      s += '<div class="table-wrap"><table><thead><tr>';
      s += '<th>Player</th><th>From</th><th>To</th><th>Date</th><th>Level</th><th>Power</th>';
      s += '</tr></thead><tbody>';
      for (const p of players) {
        s += '<tr>';
        s += `<td>${playerLink(p)}</td>`;
        s += `<td>${esc(p.prev_alliance_tag || '(none)')}</td>`;
        s += `<td>${esc(p.alliance_tag || '(none)')}</td>`;
        s += `<td>${p.moved_date || ''}</td>`;
        s += `<td>${p.level}</td>`;
        s += `<td>${formatAbbr(p.power)}</td>`;
        s += '</tr>';
      }
      s += '</tbody></table></div>';
      return s;
    }

    if (homeMoves.length > 0) {
      html += movementTable(homeMoves, 'NWS-Related Movements');
    }
    if (otherMoves.length > 0) {
      html += movementTable(otherMoves, 'Other Alliance Movements');
    }

    return html;
  }

  // ===== TAB: Player Leaderboard =====
  function renderPlayerLeaderboard() {
    const players = [...playerData.players];

    let filtered = players;
    if (plbSearch.length >= 2) {
      const q = plbSearch.toLowerCase();
      filtered = players.filter(p =>
        p.name.toLowerCase().includes(q) ||
        (p.alliance_tag && p.alliance_tag.toLowerCase().includes(q))
      );
    }

    const cols = [
      { key: 'rank',             label: '#',              sortable: false },
      { key: 'name',             label: 'Player',         type: 'name' },
      { key: 'alliance_tag',     label: 'Alliance',       type: 'text' },
      { key: 'level',            label: 'Level',          type: 'num' },
      { key: 'activity_score',   label: 'Activity',       type: 'num' },
      { key: 'power',            label: 'Power',          delta: true },
      { key: 'players_killed',   label: 'PVP Kills',      delta: true },
      { key: 'hostiles_killed',  label: 'Hostile Kills',  delta: true },
      { key: 'resources_mined',  label: 'RSS Mined',      delta: true },
      { key: 'resources_raided', label: 'RSS Raided',     delta: true },
    ];

    const sortDef = cols.find(c => c.key === plbSortCol);
    if (sortDef) {
      if (sortDef.type === 'name' || sortDef.type === 'text') {
        filtered.sort((a, b) => {
          const va = (a[plbSortCol] || '').toLowerCase();
          const vb = (b[plbSortCol] || '').toLowerCase();
          const v = va.localeCompare(vb);
          return plbSortAsc ? v : -v;
        });
      } else {
        const useDelta = sortDef.delta && plbPeriod;
        const sortKey = useDelta ? getDeltaKey(plbSortCol, plbPeriod) : plbSortCol;
        filtered.sort((a, b) => {
          const v = (a[sortKey] || 0) - (b[sortKey] || 0);
          return plbSortAsc ? v : -v;
        });
      }
    }

    function findLeader(field) {
      if (filtered.length === 0) return null;
      const dk = getDeltaKey(field, plbPeriod);
      return filtered.reduce((best, p) => (p[dk] || 0) > (best[dk] || 0) ? p : best);
    }
    function leaderCard(label, field) {
      const leader = findLeader(field);
      if (!leader) return '';
      const dk = getDeltaKey(field, plbPeriod);
      const val = leader[dk] || 0;
      if (val <= 0) return '';
      return `<div class="card"><div class="label">${label} (${plbPeriod}d)</div><div class="value">${formatAbbr(val)}</div><div class="sub">${esc(leader.name)}</div></div>`;
    }
    const topPower = filtered.length > 0 ? filtered.reduce((best, p) => (p.power || 0) > (best.power || 0) ? p : best) : null;

    const cardParts = [];
    if (filtered.length > 0) cardParts.push(`<div class="card"><div class="label">Total Players</div><div class="value">${filtered.length.toLocaleString()}</div></div>`);
    if (topPower && topPower.power > 0) cardParts.push(`<div class="card"><div class="label">Most Powerful</div><div class="value">${formatAbbr(topPower.power)}</div><div class="sub">${esc(topPower.name)}</div></div>`);
    for (const [label, field] of [['Power Gained','power'],['PVP Kills','players_killed'],['Hostile Kills','hostiles_killed'],['RSS Mined','resources_mined'],['RSS Raided','resources_raided'],['Helps','helps'],['ISO Contributed','iso_contrib']]) {
      const c = leaderCard(label, field);
      if (c) cardParts.push(c);
    }
    let html = '';
    if (cardParts.length > 0) {
      html += '<div class="cards">' + cardParts.join('') + '</div>';
    }

    html += '<div class="search-wrap">';
    html += `<input type="text" class="search-input" id="plb-search" placeholder="Search by player name or alliance tag..." value="${esc(plbSearch)}">`;
    html += '</div>';

    html += '<div class="period-bar">';
    for (const [p, label] of [[1, 'Yesterday'], [7, 'This Week'], [30, 'This Month']]) {
      const active = plbPeriod === p ? ' active' : '';
      html += `<button class="period-btn${active}" data-period="${p}">${label}</button>`;
    }
    html += '</div>';

    if (playerData.delta_dates) {
      const baseDate = playerData.delta_dates[`${plbPeriod}d`];
      if (baseDate) {
        html += `<div style="text-align:center;font-size:0.78rem;color:var(--text-dim);margin-bottom:16px;">Comparing against ${baseDate}</div>`;
      }
    }

    const shown = filtered.slice(0, 500);

    html += '<div class="table-wrap"><table><thead><tr>';
    for (const col of cols) {
      if (col.sortable === false) {
        html += `<th>${col.label}</th>`;
      } else {
        const arrow = plbSortCol === col.key ? (plbSortAsc ? '&#9650;' : '&#9660;') : '';
        html += `<th data-col="${col.key}">${col.label}<span class="arrow">${arrow}</span></th>`;
      }
    }
    html += '</tr></thead><tbody>';

    for (let i = 0; i < shown.length; i++) {
      const p = shown[i];
      const isHome = p.alliance_id === HOME_ALLIANCE_ID;
      const rowCls = isHome ? 'home-row' : '';
      html += `<tr class="${rowCls}">`;
      html += `<td>${i + 1}</td>`;
      html += `<td>${playerLink(p)}</td>`;
      html += `<td>${esc(p.alliance_tag || '—')}</td>`;

      const levelDelta = p[getDeltaKey('level', plbPeriod)] || 0;
      if (levelDelta > 0) {
        html += `<td>${p.level} <span class="delta-pos" style="font-size:0.75rem">+${levelDelta}</span></td>`;
      } else {
        html += `<td>${p.level}</td>`;
      }

      html += `<td>${activityBadge(p.activity_score)}</td>`;

      for (const col of cols.filter(c => c.delta)) {
        const val = p[col.key] || 0;
        const delta = p[getDeltaKey(col.key, plbPeriod)] || 0;
        html += `<td>${gainCellHtml(val, delta)}</td>`;
      }

      html += '</tr>';
    }
    html += '</tbody></table></div>';

    if (filtered.length > 500) {
      html += `<div class="empty">Showing top 500 of ${filtered.length.toLocaleString()} players. Use search to find specific players.</div>`;
    }

    return html;
  }

  function attachPlayerLeaderboardHandlers() {
    document.querySelectorAll('#tab-content th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (plbSortCol === col) plbSortAsc = !plbSortAsc;
        else { plbSortCol = col; plbSortAsc = (col === 'name' || col === 'alliance_tag'); }
        rerenderPlayerLeaderboard();
      });
    });
    document.querySelectorAll('#tab-content .period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        plbPeriod = parseInt(btn.dataset.period);
        rerenderPlayerLeaderboard();
      });
    });
    const searchInput = document.getElementById('plb-search');
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        plbSearch = searchInput.value;
        rerenderPlayerLeaderboard();
        const newInput = document.getElementById('plb-search');
        if (newInput) {
          newInput.focus();
          newInput.setSelectionRange(newInput.value.length, newInput.value.length);
        }
      });
    }
  }

  function rerenderPlayerLeaderboard() {
    document.getElementById('tab-content').innerHTML = renderPlayerLeaderboard();
    attachPlayerLeaderboardHandlers();
  }

  // ===== TAB: Recruiting Board =====
  function computeRecruitScore(p) {
    const activityPct = Math.min((p.activity_score || 0) / 100, 1);
    let availability = 0;
    if (!p.alliance_tag || p.alliance_tag === '') {
      availability = 1;
    } else {
      const memberCount = allianceMemberCounts[p.alliance_tag] || 0;
      const allyAvg = allianceAvgActivity[p.alliance_tag] || 0;
      const smallPct = Math.max(0, 1 - (memberCount / 20));
      const inactivePct = allyAvg < avgActivityScore ? 1 - Math.max(0, allyAvg / avgActivityScore) : 0;
      availability = Math.max(smallPct, inactivePct);
    }
    return (activityPct * 0.6) + (availability * 0.4);
  }

  function scoreBadge(score) {
    if (score >= 0.6) return '<span class="badge badge-hot">HOT</span>';
    if (score >= 0.45) return '<span class="badge badge-warm">WARM</span>';
    if (score >= 0.3) return '<span class="badge badge-cool">COOL</span>';
    return '<span class="badge badge-cold">COLD</span>';
  }

  function testNoAlliance(p) { return !p.alliance_tag || p.alliance_tag === ''; }
  function testSmallAlliance(p) { return p.alliance_tag && (allianceMemberCounts[p.alliance_tag] || 0) < 10; }
  function testRecentlyMoved(p) { return p.moved === true; }
  function testHighActivity(p) { return (p.activity_score || 0) > avgActivityScore; }
  function testHighLevel(p, minLevel) { return (p.level || 0) >= minLevel; }

  function renderRecruiting() {
    const basePlayers = playerData.players.filter(p => p.alliance_id !== HOME_ALLIANCE_ID);

    const filterCounts = {
      noAlliance:    basePlayers.filter(testNoAlliance).length,
      smallAlliance: basePlayers.filter(testSmallAlliance).length,
      recentlyMoved: basePlayers.filter(testRecentlyMoved).length,
      highActivity:  basePlayers.filter(testHighActivity).length,
      highLevel:     basePlayers.filter(p => testHighLevel(p, recMinLevel)).length,
    };

    let players = [...basePlayers];
    if (recFilters.noAlliance) players = players.filter(testNoAlliance);
    if (recFilters.smallAlliance) players = players.filter(testSmallAlliance);
    if (recFilters.recentlyMoved) players = players.filter(testRecentlyMoved);
    if (recFilters.highActivity) players = players.filter(testHighActivity);
    if (recFilters.highLevel) players = players.filter(p => testHighLevel(p, recMinLevel));
    if (recMinPower > 0) players = players.filter(p => (p.power || 0) >= recMinPower);

    if (recSearch.length >= 2) {
      const q = recSearch.toLowerCase();
      players = players.filter(p =>
        p.name.toLowerCase().includes(q) ||
        (p.alliance_tag && p.alliance_tag.toLowerCase().includes(q))
      );
    }

    for (const p of players) p._score = computeRecruitScore(p);

    const cols = [
      { key: 'rank',             label: '#',              sortable: false },
      { key: 'recruit_score',    label: 'Score',          type: 'score' },
      { key: 'name',             label: 'Player',         type: 'name' },
      { key: 'alliance_tag',     label: 'Alliance',       type: 'text' },
      { key: 'level',            label: 'Level',          type: 'num' },
      { key: 'activity_score',   label: 'Activity',       type: 'num' },
      { key: 'power',            label: 'Power',          delta: true },
      { key: 'players_killed',   label: 'PVP Kills',      delta: true },
      { key: 'hostiles_killed',  label: 'Hostile Kills',  delta: true },
      { key: 'resources_mined',  label: 'RSS Mined',      delta: true },
      { key: 'resources_raided', label: 'RSS Raided',     delta: true },
    ];

    const sortDef = cols.find(c => c.key === recSortCol);
    if (sortDef) {
      if (sortDef.type === 'score') {
        players.sort((a, b) => {
          const v = (a._score || 0) - (b._score || 0);
          return recSortAsc ? v : -v;
        });
      } else if (sortDef.type === 'name' || sortDef.type === 'text') {
        players.sort((a, b) => {
          const va = (a[recSortCol] || '').toLowerCase();
          const vb = (b[recSortCol] || '').toLowerCase();
          return recSortAsc ? va.localeCompare(vb) : -va.localeCompare(vb);
        });
      } else {
        const useDelta = sortDef.delta && recPeriod;
        const sortKey = useDelta ? getDeltaKey(recSortCol, recPeriod) : recSortCol;
        players.sort((a, b) => {
          const v = (a[sortKey] || 0) - (b[sortKey] || 0);
          return recSortAsc ? v : -v;
        });
      }
    }

    let html = '';

    html += '<div class="filter-bar">';
    const toggleDefs = [
      ['noAlliance',    'No Alliance'],
      ['smallAlliance', 'Small Alliance (<10)'],
      ['recentlyMoved', 'Recently Moved'],
      ['highActivity',  'High Activity'],
      ['highLevel',     'High Level'],
    ];
    for (const [key, label] of toggleDefs) {
      const active = recFilters[key] ? ' active' : '';
      html += `<button class="filter-toggle${active}" data-filter="${key}">${label} (${filterCounts[key]})</button>`;
    }
    html += '<div class="filter-input-wrap">';
    html += `<label>Min Level:</label><input type="number" id="rec-min-level" value="${recMinLevel}" min="1" max="99">`;
    html += '</div>';
    html += '<div class="filter-input-wrap">';
    html += `<label>Min Power:</label><input type="number" id="rec-min-power" value="${recMinPower}" min="0" step="1000000">`;
    html += '</div>';
    html += '</div>';

    html += '<div class="search-wrap">';
    html += `<input type="text" class="search-input" id="rec-search" placeholder="Search by player name or alliance tag..." value="${esc(recSearch)}">`;
    html += '</div>';

    html += '<div class="period-bar">';
    for (const [p, label] of [[1, 'Yesterday'], [7, 'This Week'], [30, 'This Month']]) {
      const active = recPeriod === p ? ' active' : '';
      html += `<button class="period-btn${active}" data-period="${p}">${label}</button>`;
    }
    html += '</div>';

    html += `<div class="result-count">${players.length.toLocaleString()} players</div>`;

    const shown = players.slice(0, 500);

    html += '<div class="table-wrap"><table><thead><tr>';
    for (const col of cols) {
      if (col.sortable === false) {
        html += `<th>${col.label}</th>`;
      } else {
        const arrow = recSortCol === col.key ? (recSortAsc ? '&#9650;' : '&#9660;') : '';
        html += `<th data-col="${col.key}">${col.label}<span class="arrow">${arrow}</span></th>`;
      }
    }
    html += '</tr></thead><tbody>';

    for (let i = 0; i < shown.length; i++) {
      const p = shown[i];
      html += '<tr>';
      html += `<td>${i + 1}</td>`;
      html += `<td>${scoreBadge(p._score)}</td>`;
      html += `<td>${playerLink(p)}</td>`;

      if (p.alliance_tag) {
        const mc = allianceMemberCounts[p.alliance_tag] || 0;
        html += `<td>${esc(p.alliance_tag)} <span style="font-size:0.7rem;color:var(--text-dim)">(${mc})</span></td>`;
      } else {
        html += '<td><span style="color:var(--text-dim)">None</span></td>';
      }

      const levelDelta = p[getDeltaKey('level', recPeriod)] || 0;
      if (levelDelta > 0) {
        html += `<td>${p.level} <span class="delta-pos" style="font-size:0.75rem">+${levelDelta}</span></td>`;
      } else {
        html += `<td>${p.level}</td>`;
      }

      html += `<td>${activityBadge(p.activity_score)}</td>`;

      for (const col of cols.filter(c => c.delta)) {
        const val = p[col.key] || 0;
        const delta = p[getDeltaKey(col.key, recPeriod)] || 0;
        html += `<td>${gainCellHtml(val, delta)}</td>`;
      }

      html += '</tr>';
    }
    html += '</tbody></table></div>';

    if (players.length > 500) {
      html += `<div class="empty">Showing top 500 of ${players.length.toLocaleString()} matches. Use search or filters to narrow down.</div>`;
    }

    return html;
  }

  function attachRecruitingHandlers() {
    document.querySelectorAll('#tab-content .filter-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.filter;
        recFilters[key] = !recFilters[key];
        rerenderRecruiting();
      });
    });
    const minLevelInput = document.getElementById('rec-min-level');
    if (minLevelInput) {
      minLevelInput.addEventListener('change', () => {
        recMinLevel = parseInt(minLevelInput.value) || 25;
        rerenderRecruiting();
      });
    }
    const minPowerInput = document.getElementById('rec-min-power');
    if (minPowerInput) {
      minPowerInput.addEventListener('change', () => {
        recMinPower = parseInt(minPowerInput.value) || 0;
        rerenderRecruiting();
      });
    }
    document.querySelectorAll('#tab-content th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (recSortCol === col) recSortAsc = !recSortAsc;
        else { recSortCol = col; recSortAsc = (col === 'name' || col === 'alliance_tag'); }
        rerenderRecruiting();
      });
    });
    document.querySelectorAll('#tab-content .period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        recPeriod = parseInt(btn.dataset.period);
        rerenderRecruiting();
      });
    });
    const searchInput = document.getElementById('rec-search');
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        recSearch = searchInput.value;
        rerenderRecruiting();
        const newInput = document.getElementById('rec-search');
        if (newInput) {
          newInput.focus();
          newInput.setSelectionRange(newInput.value.length, newInput.value.length);
        }
      });
    }
  }

  function rerenderRecruiting() {
    document.getElementById('tab-content').innerHTML = renderRecruiting();
    attachRecruitingHandlers();
  }

})();
</script>
</body>
</html>
