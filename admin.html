<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCC Admin Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0e17;
    color: #c8d6e5;
    min-height: 100vh;
    line-height: 1.5;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

  /* Header */
  header {
    text-align: center;
    padding: 30px 0 20px;
    border-bottom: 1px solid #1a2332;
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 1.8rem;
    color: #e2e8f0;
    letter-spacing: 1px;
  }
  header h1 span { color: #4dabf7; }
  .updated {
    font-size: 0.85rem;
    color: #636e7b;
    margin-top: 6px;
  }

  /* Nav */
  nav {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  nav a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #111827;
    border: 1px solid #1e2d3d;
    color: #8899aa;
    padding: 6px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  nav a:hover { border-color: #4dabf7; color: #c8d6e5; }
  nav a.active { background: #4dabf7; color: #0a0e17; border-color: #4dabf7; font-weight: 600; }
  .nav-lock { font-size: 0.78rem; opacity: 0.75; }
  .nav-admin::after {
    content: 'ADMIN';
    display: inline-flex;
    align-items: center;
    padding: 2px 6px;
    border-radius: 999px;
    background: #f8717122;
    border: 1px solid #f8717140;
    color: #fca5a5;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
  }

  /* Login */
  #login-gate {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60vh;
  }
  .login-box {
    background: #111827;
    border: 1px solid #1e2d3d;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    max-width: 360px;
    width: 100%;
  }
  .login-box h2 {
    color: #e2e8f0;
    font-size: 1.3rem;
    margin-bottom: 20px;
  }
  .login-box input {
    width: 100%;
    padding: 10px 14px;
    background: #0a0e17;
    border: 1px solid #1e2d3d;
    border-radius: 6px;
    color: #c8d6e5;
    font-size: 1rem;
    font-family: inherit;
    margin-bottom: 14px;
  }
  .login-box input:focus {
    outline: none;
    border-color: #4dabf7;
  }
  .login-box button {
    width: 100%;
    padding: 10px;
    background: #4dabf7;
    color: #0a0e17;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .login-box button:hover { background: #74c0fc; }
  .login-error {
    color: #f87171;
    font-size: 0.85rem;
    margin-top: 10px;
    min-height: 1.2em;
  }

  /* Sections */
  .section {
    margin-bottom: 32px;
  }
  .section-header {
    font-size: 1.15rem;
    color: #e2e8f0;
    font-weight: 600;
    padding-bottom: 10px;
    border-bottom: 1px solid #1e2d3d;
    margin-bottom: 16px;
  }

  /* Tables */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid #1e2d3d;
    border-radius: 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    padding: 10px 14px;
    text-align: left;
    white-space: nowrap;
  }
  th {
    background: #111827;
    color: #8899aa;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    position: sticky;
    top: 0;
  }
  tr { border-bottom: 1px solid #1a2332; }
  tr:last-child { border-bottom: none; }
  tr:hover td { background: #111827; }
  td { font-size: 0.9rem; }

  /* Activity badges */
  .activity-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .activity-high   { background: #0d946822; color: #34d399; border: 1px solid #0d946844; }
  .activity-medium { background: #d9770622; color: #fb923c; border: 1px solid #d9770644; }
  .activity-low    { background: #dc262622; color: #f87171; border: 1px solid #dc262644; }
  .activity-none   { background: #4a556822; color: #636e7b; border: 1px solid #4a556844; }

  /* Delta colors */
  .delta-pos { color: #34d399; }
  .delta-neg { color: #f87171; }
  .delta-zero { color: #3a4250; }

  /* Cards grid for bottom contributors */
  .mini-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  .mini-card {
    background: #111827;
    border: 1px solid #1e2d3d;
    border-radius: 10px;
    padding: 16px;
  }
  .mini-card h3 {
    font-size: 0.85rem;
    color: #8899aa;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .mini-card ol {
    list-style: none;
    counter-reset: rank;
  }
  .mini-card ol li {
    counter-increment: rank;
    padding: 4px 0;
    font-size: 0.88rem;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #1a2332;
  }
  .mini-card ol li:last-child { border-bottom: none; }
  .mini-card ol li::before {
    content: counter(rank) ".";
    color: #636e7b;
    margin-right: 8px;
    font-weight: 600;
    min-width: 1.5em;
  }
  .mini-card .li-name { flex: 1; }
  .mini-card .li-val {
    color: #636e7b;
    font-variant-numeric: tabular-nums;
  }

  /* Activity distribution */
  .activity-dist {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .activity-dist-item {
    background: #111827;
    border: 1px solid #1e2d3d;
    border-radius: 10px;
    padding: 16px 24px;
    text-align: center;
    min-width: 120px;
  }
  .activity-dist-item .rd-count {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .activity-dist-item .rd-label {
    font-size: 0.8rem;
    font-weight: 600;
  }

  /* Power movers grid */
  .movers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* Empty state */
  .empty {
    color: #4a5568;
    font-style: italic;
    padding: 12px 0;
  }

  /* Player name links */
  .player-link { color: #4dabf7; text-decoration: none; }
  .player-link:hover { text-decoration: underline; }

  /* Inventory */
  .inv-date { color: #636e7b; font-size: 0.85rem; margin-bottom: 10px; }
  .section-note {
    color: #8fa6bb;
    font-size: 0.92rem;
    margin-bottom: 14px;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 16px;
  }
  .stat-card {
    background:
      linear-gradient(160deg, rgba(77,171,247,0.12), rgba(17,24,39,0.85)),
      #111827;
    border: 1px solid #1e2d3d;
    border-radius: 12px;
    padding: 16px 18px;
    min-height: 98px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
  }
  .stat-label {
    color: #8fa6bb;
    font-size: 0.76rem;
    text-transform: uppercase;
    letter-spacing: 1.1px;
    margin-bottom: 8px;
  }
  .stat-value {
    color: #f8fbff;
    font-size: 1.9rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-sub {
    color: #6f8498;
    font-size: 0.82rem;
  }
  .cmd-box {
    background: linear-gradient(180deg, rgba(18, 28, 43, 0.98), rgba(9, 14, 23, 0.98));
    border: 1px solid #23405c;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 18px;
    overflow-x: auto;
  }
  .cmd-box code {
    color: #8fe0ff;
    font-size: 0.9rem;
    font-family: Consolas, 'Courier New', monospace;
    white-space: nowrap;
  }
  .section-action-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(77,171,247,0.18), rgba(77,171,247,0.08));
    border: 1px solid #27527b;
    color: #a8dbff;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 600;
    margin-bottom: 18px;
  }
  .section-action-link:hover {
    border-color: #4dabf7;
    color: #d7efff;
  }
  .cell-sub {
    display: block;
    color: #6f8498;
    font-size: 0.78rem;
    margin-top: 2px;
  }
  .alliance-chip {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid #27435e;
    background: rgba(77, 171, 247, 0.12);
    color: #9bd3ff;
    font-size: 0.76rem;
    font-weight: 600;
    letter-spacing: 0.4px;
  }
  .notes-cell {
    max-width: 320px;
    white-space: normal;
    color: #b9c8d6;
  }
  .screenshot-cell {
    min-width: 180px;
  }
  .screenshot-thumb {
    display: inline-block;
    width: 72px;
    height: 72px;
    margin: 0 8px 8px 0;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #27435e;
    background: rgba(10, 14, 24, 0.9);
  }
  .screenshot-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Loading / Error */
  .loading {
    text-align: center;
    padding: 60px 0;
    color: #636e7b;
    font-size: 1.1rem;
  }
  .error { color: #f87171; }

  /* Footer */
  footer {
    text-align: center;
    padding: 24px 0;
    margin-top: 28px;
    border-top: 1px solid #1a2332;
    font-size: 0.8rem;
    color: #4a5568;
  }
  footer a { color: #4dabf7; text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .container { padding: 12px; }
    header h1 { font-size: 1.3rem; }
    .movers-grid { grid-template-columns: 1fr; }
  }
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>
<div class="container">
  <header>
    <h1><span>NCC</span> Admin Dashboard</h1>
    <div class="updated" id="updated"></div>
  </header>

  <nav>
    <a href="index">Tracker</a>
    <a href="calendar">Calendar</a>
    <a href="server" class="nav-admin">Server <span class="nav-lock" aria-hidden="true">&#128274;</span></a>
    <a href="leaderboard" class="nav-admin">Leaderboard <span class="nav-lock" aria-hidden="true">&#128274;</span></a>
    <a href="intel" class="nav-admin">Intel <span class="nav-lock" aria-hidden="true">&#128274;</span></a>
    <a href="/roe-admin/" class="nav-admin">ROE Violations <span class="nav-lock" aria-hidden="true">&#128274;</span></a>
    <a href="admin" class="active nav-admin">Admin <span class="nav-lock" aria-hidden="true">&#128274;</span></a>
  </nav>

  <div id="login-gate">
    <div class="login-box">
      <h2>Alliance Leaders Only</h2>
      <input type="password" id="pw-input" placeholder="Enter password" autocomplete="off">
      <button id="pw-btn">Enter</button>
      <div class="login-error" id="pw-error"></div>
    </div>
  </div>

  <div id="content" style="display:none">
    <div class="loading">Loading alliance data...</div>
  </div>

  <footer style="display:none" id="footer-el">
    Data sourced from Scopely game APIs
    &middot; <a href="index.html">Main Dashboard</a>
  </footer>
</div>

<script>
(function() {
  const $ = id => document.getElementById(id);

  // --- Auth gate ---
  const PASSWORD = 'salsa';

  function checkAuth() {
    return sessionStorage.getItem('ncc_admin_auth') === 'ok';
  }

  function showDashboard() {
    $('login-gate').style.display = 'none';
    $('content').style.display = '';
    $('footer-el').style.display = '';
    loadData();
  }

  if (checkAuth()) {
    showDashboard();
  } else {
    $('pw-btn').addEventListener('click', tryLogin);
    $('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  }

  function tryLogin() {
    const val = $('pw-input').value;
    if (val === PASSWORD) {
      sessionStorage.setItem('ncc_admin_auth', 'ok');
      showDashboard();
    } else {
      $('pw-error').textContent = 'Incorrect password';
      $('pw-input').value = '';
      $('pw-input').focus();
    }
  }

  // --- Utility functions ---
  function parseAbbr(str) {
    if (!str) return 0;
    str = String(str).trim().replace(/,/g, '');
    const m = str.match(/^([\d.]+)\s*([KMBQT]?)$/i);
    if (!m) return 0;
    const num = parseFloat(m[1]);
    const suffix = m[2].toUpperCase();
    if (suffix === 'K') return num * 1e3;
    if (suffix === 'M') return num * 1e6;
    if (suffix === 'B') return num * 1e9;
    if (suffix === 'T') return num * 1e12;
    if (suffix === 'Q') return num * 1e15;
    return num;
  }

  function formatAbbr(n) {
    if (n === 0) return '0';
    const abs = Math.abs(n);
    const sign = n < 0 ? '-' : '';
    let val, suf;
    if (abs >= 1e15)      { val = abs / 1e15; suf = 'Q'; }
    else if (abs >= 1e12) { val = abs / 1e12; suf = 'T'; }
    else if (abs >= 1e9)  { val = abs / 1e9;  suf = 'B'; }
    else if (abs >= 1e6)  { val = abs / 1e6;  suf = 'M'; }
    else if (abs >= 1e3)  { val = abs / 1e3;  suf = 'K'; }
    else                  { val = abs;         suf = '';  }
    return sign + val.toFixed(2).replace(/\.?0+$/, '') + suf;
  }

  function formatNum(n) {
    if (n === 0) return '0';
    const abs = Math.abs(n);
    const sign = n < 0 ? '-' : '+';
    let val, suf;
    if (abs >= 1e15)      { val = abs / 1e15; suf = 'Q'; }
    else if (abs >= 1e12) { val = abs / 1e12; suf = 'T'; }
    else if (abs >= 1e9)  { val = abs / 1e9;  suf = 'B'; }
    else if (abs >= 1e6)  { val = abs / 1e6;  suf = 'M'; }
    else if (abs >= 1e3)  { val = abs / 1e3;  suf = 'K'; }
    else                  { val = abs;         suf = '';  }
    return sign + val.toFixed(2).replace(/\.?0+$/, '') + suf;
  }

  function esc(s) {
    const el = document.createElement('span');
    el.textContent = s || '';
    return el.innerHTML;
  }

  function activityClass(score) {
    if (score >= 80) return 'activity-badge activity-high';
    if (score >= 60) return 'activity-badge activity-medium';
    if (score >= 30) return 'activity-badge activity-low';
    return 'activity-badge activity-none';
  }

  function activityLabel(score) {
    if (score >= 80) return 'Active';
    if (score >= 60) return 'Moderate';
    if (score >= 30) return 'Low';
    return 'None';
  }

  const NUMERIC_FIELDS = [
    'level', 'power', 'helps', 'iso_contrib',
    'players_killed', 'hostiles_killed', 'resources_mined', 'resources_raided',
  ];

  function playerLink(member) {
    return `<a class="player-link" href="player.html?id=${encodeURIComponent(member.id)}">${esc(member.name)}</a>`;
  }

  function entityLink(name, id) {
    if (!id) return esc(name);
    return `<a class="player-link" href="player.html?id=${encodeURIComponent(id)}">${esc(name)}</a>`;
  }

  function parseScreenshotItems(value) {
    return String(value || '')
      .split(/\r?\n|,/)
      .map(item => item.trim())
      .filter(Boolean);
  }

  function screenshotUrl(value) {
    if (!value) return '';
    if (/^https?:\/\//i.test(value)) return value;
    return value.startsWith('/') ? value : '/' + value;
  }

  function renderScreenshotThumbs(value) {
    const items = parseScreenshotItems(value);
    if (!items.length) return '-';
    return items
      .map(item => {
        const url = screenshotUrl(item);
        return `<a class="screenshot-thumb" href="${esc(url)}" target="_blank" rel="noreferrer"><img src="${esc(url)}" alt="Violation screenshot"></a>`;
      })
      .join('');
  }

  function formatShortDate(value) {
    if (!value) return '-';
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return esc(value);
    return d.toLocaleDateString('en-US', {
      year: 'numeric',
      month: 'short',
      day: 'numeric',
    });
  }

  // --- Data loading ---
  function loadData() {
    const dataP = fetch('data/latest.json?t=' + Date.now())
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
    const histP = fetch('data/history.json?t=' + Date.now())
      .then(r => { if (!r.ok) return []; return r.json(); })
      .catch(() => []);
    const invP = fetch('data/alliance_inventory.json?t=' + Date.now())
      .then(r => { if (!r.ok) return null; return r.json(); })
      .catch(() => null);
    const roeP = fetch('data/roe_violations.json?t=' + Date.now())
      .then(r => { if (!r.ok) return null; return r.json(); })
      .catch(() => null);

    Promise.all([dataP, histP, invP, roeP])
      .then(([data, hist, inv, roe]) => {
        hist.sort((a, b) => a.date.localeCompare(b.date));
        const d = new Date(data.pulled_at);
        $('updated').textContent = 'Last updated: ' + d.toLocaleDateString('en-US', {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        render(data, hist, inv, roe);
      })
      .catch(err => {
        $('content').innerHTML = `<div class="loading error">Failed to load data: ${esc(err.message)}</div>`;
      });
  }

  function getSnapshotDaysAgo(history, days) {
    if (!history.length) return null;
    const target = new Date();
    target.setDate(target.getDate() - days);
    const targetStr = target.toISOString().slice(0, 10);
    let best = null;
    for (const entry of history) {
      if (entry.date <= targetStr) best = entry;
    }
    if (!best) best = history[0];
    return best;
  }

  function render(data, history, inv, roe) {
    const members = data.members || [];
    const snap7 = getSnapshotDaysAgo(history, 7);
    let html = '';

    // --- 1. ROE Violations ---
    html += renderRoeViolations(roe);

    // --- 2. Alliance Inventory ---
    html += renderAllianceInventory(inv);

    // --- 3. Inactive Members ---
    html += renderInactive(members, history);

    // --- 4. New Members ---
    html += renderNewMembers(members, history);

    // --- 5. Members Who Left ---
    html += renderLeftMembers(members, history);

    // --- 6. Lowest Contributors ---
    html += renderLowestContributors(members, history);

    // --- 7. Power Movers (7-Day) ---
    html += renderPowerMovers(members, snap7);

    // --- 8. Activity Distribution ---
    html += renderActivityDistribution(members);

    $('content').innerHTML = html;
  }

  // --- Section renderers ---

  function renderRoeViolations(roe) {
    const total = roe?.violation_count || 0;
    const playerTallies = roe?.player_tallies || [];
    const allianceTallies = roe?.alliance_tallies || [];
    const recent = roe?.recent_violations || [];
    const latest = recent[0];

    let s = '<div class="section"><div class="section-header">ROE Violations</div>';
    s += '<div class="section-note">Use the ROE violations page for manual entry, and this dashboard will keep showing the live tallies and recent incidents.</div>';
    s += '<a class="section-action-link" href="/roe-admin/">Open ROE violations page</a>';

    const lastReported = latest ? formatShortDate(latest.reported_at || latest.offense_date) : 'None';
    s += '<div class="stat-grid">';
    s += `<div class="stat-card"><div class="stat-label">Total Violations</div><div class="stat-value">${total}</div><div class="stat-sub">Every logged incident</div></div>`;
    s += `<div class="stat-card"><div class="stat-label">Tracked Offenders</div><div class="stat-value">${roe?.unique_offender_count || 0}</div><div class="stat-sub">Unique players with incidents</div></div>`;
    s += `<div class="stat-card"><div class="stat-label">Tracked Alliances</div><div class="stat-value">${roe?.alliance_count || 0}</div><div class="stat-sub">Alliances represented in reports</div></div>`;
    s += `<div class="stat-card"><div class="stat-label">Latest Report</div><div class="stat-value" style="font-size:1.25rem; line-height:1.2">${esc(lastReported)}</div><div class="stat-sub">${latest ? esc(latest.violation_type || 'Violation logged') : 'No incidents yet'}</div></div>`;
    s += '</div>';

    if (!total) {
      s += '<div class="empty">No ROE violations have been logged yet.</div></div>';
      return s;
    }

    s += '<div class="movers-grid">';
    s += '<div class="mini-card"><h3>Top Individual Offenders</h3>';
    if (!playerTallies.length) {
      s += '<div class="empty">No offender tallies yet</div>';
    } else {
      s += '<ol>';
      for (const entry of playerTallies.slice(0, 8)) {
        const alliance = entry.offender_alliance_tag ? `<span class="alliance-chip">${esc(entry.offender_alliance_tag)}</span>` : '';
        s += `<li>
          <span class="li-name">${entityLink(entry.offender_name, entry.offender_player_id)}<span class="cell-sub">${alliance || esc(entry.offender_alliance_name || 'Alliance unknown')}</span></span>
          <span class="li-val">${entry.offense_count}</span>
        </li>`;
      }
      s += '</ol>';
    }
    s += '</div>';

    s += '<div class="mini-card"><h3>Top Offending Alliances</h3>';
    if (!allianceTallies.length) {
      s += '<div class="empty">No alliance tallies yet</div>';
    } else {
      s += '<ol>';
      for (const entry of allianceTallies.slice(0, 8)) {
        const label = entry.offender_alliance_tag || entry.offender_alliance_name || 'Unknown alliance';
        s += `<li>
          <span class="li-name">${esc(label)}<span class="cell-sub">${entry.unique_offender_count} offenders</span></span>
          <span class="li-val">${entry.offense_count}</span>
        </li>`;
      }
      s += '</ol>';
    }
    s += '</div>';
    s += '</div>';

    s += '<div class="table-wrap"><table><thead><tr>';
    s += '<th>Date</th><th>Offender</th><th>Alliance</th><th>Violation</th><th>Victim</th><th>Reported By</th><th>Screenshots</th><th>Notes</th>';
    s += '</tr></thead><tbody>';
    for (const entry of recent.slice(0, 50)) {
      const allianceLabel = entry.offender_alliance_tag || entry.offender_alliance_name || '-';
      s += `<tr>
        <td>${esc(entry.offense_date || '-')}</td>
        <td>${entityLink(entry.offender_name, entry.offender_player_id)}</td>
        <td>${esc(allianceLabel)}</td>
        <td>${esc(entry.violation_type || '-')}</td>
        <td>${entityLink(entry.victim_name, entry.victim_player_id)}</td>
        <td>${esc(entry.reported_by || '-')}</td>
        <td class="screenshot-cell">${renderScreenshotThumbs(entry.screenshots)}</td>
        <td class="notes-cell">${esc(entry.notes || '-')}</td>
      </tr>`;
    }
    s += '</tbody></table></div>';
    s += '</div>';
    return s;
  }

  function renderInactive(members, history) {
    // Walk backwards through completed days to count consecutive zero-change days.
    // Skip the latest entry (partial day) and entries with no member data (failed scrapes).
    const valid = history.filter(h => h.members && Object.keys(h.members).length > 0);
    if (valid.length < 3) return '<div class="section"><div class="section-header">Inactive Members (No Gains)</div><div class="empty">Not enough history data</div></div>';
    const completed = valid.slice(0, -1); // drop current partial day
    const inactive = [];
    for (const m of members) {
      let daysInactive = 0;
      for (let i = completed.length - 1; i >= 1; i--) {
        const curr = completed[i];
        const prev = completed[i - 1];
        const currData = curr.members[m.id];
        const prevData = prev.members[m.id];
        if (!currData || !prevData) break;
        let changed = false;
        for (const f of NUMERIC_FIELDS) {
          if (parseAbbr(currData[f]) !== parseAbbr(prevData[f])) {
            changed = true;
            break;
          }
        }
        if (changed) break;
        daysInactive++;
      }
      if (daysInactive > 0) {
        inactive.push({ ...m, daysInactive });
      }
    }
    inactive.sort((a, b) => b.daysInactive - a.daysInactive);

    let s = '<div class="section"><div class="section-header">Inactive Members (No Gains)</div>';
    if (inactive.length === 0) {
      s += '<div class="empty">No inactive members detected</div>';
    } else {
      s += '<div class="table-wrap"><table><thead><tr>';
      s += '<th>Name</th><th>Activity</th><th>Level</th><th>Power</th><th>Days Inactive</th>';
      s += '</tr></thead><tbody>';
      for (const m of inactive) {
        const score = m.activity_score || 0;
        s += `<tr>
          <td>${playerLink(m)}</td>
          <td><span class="${activityClass(score)}">${activityLabel(score)}</span></td>
          <td>${esc(m.level)}</td>
          <td>${esc(m.power)}</td>
          <td style="color:#f87171; font-weight:600">${m.daysInactive}</td>
        </tr>`;
      }
      s += '</tbody></table></div>';
    }
    s += '</div>';
    return s;
  }

  function renderNewMembers(members, history) {
    // Derive first-seen date from history (first snapshot containing the player)
    const sorted = [...history].sort((a, b) => a.date.localeCompare(b.date));
    const firstSeen = {};
    for (const snap of sorted) {
      if (!snap.members) continue;
      for (const id of Object.keys(snap.members)) {
        if (!firstSeen[id]) firstSeen[id] = snap.date;
      }
    }

    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 7);
    const cutoffStr = cutoff.toISOString().slice(0, 10);

    const newMembers = members.filter(m => {
      const fs = firstSeen[m.id];
      return fs && fs >= cutoffStr;
    });
    newMembers.sort((a, b) => (firstSeen[b.id] || '').localeCompare(firstSeen[a.id] || ''));

    let s = '<div class="section"><div class="section-header">New Members (Last 7 Days)</div>';
    if (newMembers.length === 0) {
      s += '<div class="empty">No new members in the last 7 days</div>';
    } else {
      s += '<div class="table-wrap"><table><thead><tr>';
      s += '<th>Name</th><th>Level</th><th>Power</th><th>First Seen</th>';
      s += '</tr></thead><tbody>';
      for (const m of newMembers) {
        s += `<tr>
          <td>${playerLink(m)}</td>
          <td>${esc(m.level)}</td>
          <td>${esc(m.power)}</td>
          <td>${esc(firstSeen[m.id])}</td>
        </tr>`;
      }
      s += '</tbody></table></div>';
    }
    s += '</div>';
    return s;
  }

  function renderLeftMembers(members, history) {
    const currentIds = new Set(members.map(m => m.id));
    // Scan all history to find players who were once members but no longer are
    // Track their last known data and last seen date
    const leftMap = {}; // id -> { name, level, power, lastSeen }
    const sorted = [...history].sort((a, b) => a.date.localeCompare(b.date));
    for (const snap of sorted) {
      if (!snap.members) continue;
      for (const [id, mData] of Object.entries(snap.members)) {
        if (!currentIds.has(id)) {
          leftMap[id] = { id, ...mData, lastSeen: snap.date };
        }
      }
    }
    const left = Object.values(leftMap);
    left.sort((a, b) => (b.lastSeen || '').localeCompare(a.lastSeen || ''));

    let s = '<div class="section"><div class="section-header">Members Who Left</div>';
    if (left.length === 0) {
      s += '<div class="empty">No members have left since tracking began</div>';
    } else {
      s += '<div class="table-wrap"><table><thead><tr>';
      s += '<th>Name</th><th>Last Level</th><th>Last Power</th><th>Last Seen</th>';
      s += '</tr></thead><tbody>';
      for (const m of left) {
        s += `<tr>
          <td>${playerLink(m)}</td>
          <td>${esc(m.level)}</td>
          <td>${esc(m.power)}</td>
          <td>${esc(m.lastSeen)}</td>
        </tr>`;
      }
      s += '</tbody></table></div>';
    }
    s += '</div>';
    return s;
  }

  function renderLowestContributors(members, history) {
    // For helps, compute gain since member's first appearance in history
    // (lifetime helps is meaningless — we want alliance-specific contribution)
    function getHelpsGained(m) {
      for (const snap of history) {
        const past = snap.members[m.id];
        if (past) return parseAbbr(m.helps) - parseAbbr(past.helps);
      }
      return 0; // no history — can't compute gain
    }

    const categories = [
      { label: 'Lowest Helps (Gained)', field: 'helps', valueFn: getHelpsGained, formatFn: formatAbbr },
      { label: 'Lowest ISO Contrib', field: 'iso_contrib' },
    ];

    let s = '<div class="section"><div class="section-header">Lowest Contributors (Bottom 5)</div>';
    s += '<div class="mini-cards">';
    for (const cat of categories) {
      const getValue = cat.valueFn || (m => parseAbbr(m[cat.field]));
      const formatVal = cat.formatFn || (v => esc(members.find(x => x._sortVal === v) ? '' : String(v)));
      const enriched = members.map(m => ({ ...m, _sortVal: getValue(m) }));
      enriched.sort((a, b) => a._sortVal - b._sortVal);
      const bottom = enriched.slice(0, 5);
      s += `<div class="mini-card"><h3>${cat.label}</h3><ol>`;
      for (const m of bottom) {
        const display = cat.valueFn ? formatAbbr(m._sortVal) : esc(m[cat.field]);
        s += `<li>
          <span class="li-name">${playerLink(m)}</span>
          <span class="li-val">${display}</span>
        </li>`;
      }
      s += '</ol></div>';
    }
    s += '</div></div>';
    return s;
  }

  function renderPowerMovers(members, snap7) {
    let s = '<div class="section"><div class="section-header">Power Movers (7-Day)</div>';
    if (!snap7 || !snap7.members) {
      s += '<div class="empty">Not enough history for 7-day comparison</div></div>';
      return s;
    }

    // Compute deltas
    const deltas = [];
    for (const m of members) {
      const past = snap7.members[m.id];
      if (!past) continue;
      const curr = parseAbbr(m.power);
      const prev = parseAbbr(past.power);
      deltas.push({ ...m, delta: curr - prev, currPower: curr });
    }

    const gainers = [...deltas].sort((a, b) => b.delta - a.delta).slice(0, 5);
    const losers = [...deltas].sort((a, b) => a.delta - b.delta).slice(0, 5).filter(m => m.delta < 0);

    s += '<div class="movers-grid">';

    // Top gainers
    s += '<div class="mini-card"><h3>Top Gainers</h3><ol>';
    for (const m of gainers) {
      const cls = m.delta > 0 ? 'delta-pos' : (m.delta < 0 ? 'delta-neg' : 'delta-zero');
      s += `<li>
        <span class="li-name">${playerLink(m)}</span>
        <span class="li-val"><span class="${cls}">${formatNum(m.delta)}</span> &middot; ${formatAbbr(m.currPower)}</span>
      </li>`;
    }
    s += '</ol></div>';

    // Top losers
    s += '<div class="mini-card"><h3>Top Losers</h3>';
    if (losers.length === 0) {
      s += '<div class="empty">No power losses</div>';
    } else {
      s += '<ol>';
      for (const m of losers) {
        s += `<li>
          <span class="li-name">${playerLink(m)}</span>
          <span class="li-val"><span class="delta-neg">${formatNum(m.delta)}</span> &middot; ${formatAbbr(m.currPower)}</span>
        </li>`;
      }
      s += '</ol>';
    }
    s += '</div>';

    s += '</div></div>';
    return s;
  }

  function renderActivityDistribution(members) {
    const buckets = [
      { label: 'Active', min: 80, cls: 'activity-high' },
      { label: 'Moderate', min: 60, cls: 'activity-medium' },
      { label: 'Low', min: 30, cls: 'activity-low' },
      { label: 'None', min: 0, cls: 'activity-none' },
    ];
    const counts = buckets.map(() => 0);
    for (const m of members) {
      const score = m.activity_score || 0;
      for (let i = 0; i < buckets.length; i++) {
        if (score >= buckets[i].min) { counts[i]++; break; }
      }
    }

    let s = '<div class="section"><div class="section-header">Activity Distribution</div>';
    s += '<div class="activity-dist">';
    for (let i = 0; i < buckets.length; i++) {
      const b = buckets[i];
      s += `<div class="activity-dist-item">
        <div class="rd-count"><span class="activity-badge ${b.cls}" style="font-size:inherit; padding:0; border:none; background:none">${counts[i]}</span></div>
        <div class="rd-label"><span class="activity-badge ${b.cls}">${b.label}</span></div>
      </div>`;
    }
    s += '</div></div>';
    return s;
  }

  function renderAllianceInventory(inv) {
    let s = '<div class="section"><div class="section-header">Alliance Inventory</div>';
    if (!inv || !inv.latest || Object.keys(inv.latest).length === 0) {
      s += '<div class="empty">No alliance inventory data yet. Open the Alliance Inventory screen in-game to capture a snapshot.</div>';
      s += '</div>';
      return s;
    }

    const snapshots = inv.snapshots || [];
    const latestDate = snapshots.length ? snapshots[snapshots.length - 1].date : '';
    const deltas = inv.deltas || {};

    // Sort items by count descending
    const items = Object.entries(inv.latest).sort((a, b) => b[1] - a[1]);

    s += `<div class="inv-date">Latest snapshot: ${esc(latestDate)} &middot; ${items.length} items</div>`;
    s += '<div class="table-wrap"><table><thead><tr>';
    s += '<th>Item</th><th style="text-align:right">Quantity</th><th style="text-align:right">Daily Change</th>';
    s += '</tr></thead><tbody>';
    for (const [name, count] of items) {
      const delta = deltas[name] || 0;
      let deltaStr = '';
      let deltaClass = 'delta-zero';
      if (delta > 0) { deltaStr = '+' + formatAbbr(delta); deltaClass = 'delta-pos'; }
      else if (delta < 0) { deltaStr = formatAbbr(delta); deltaClass = 'delta-neg'; }
      else { deltaStr = '-'; }

      s += `<tr>
        <td>${esc(name)}</td>
        <td style="text-align:right">${formatAbbr(count)}</td>
        <td style="text-align:right"><span class="${deltaClass}">${deltaStr}</span></td>
      </tr>`;
    }
    s += '</tbody></table></div>';

    s += '</div>';
    return s;
  }

})();
</script>
