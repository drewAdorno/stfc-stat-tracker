name: CI + Deploy

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest --tb=short -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/stfc
            git checkout -- .
            git pull origin master
            venv/bin/pip install -r requirements.txt --quiet
            venv/bin/playwright install --with-deps chromium
            chmod +x deploy/*.sh

            # Update systemd services from repo
            sudo cp deploy/stfc-scraper.service /etc/systemd/system/
            sudo cp deploy/stfc-scraper-failure.service /etc/systemd/system/
            sudo cp deploy/stfc-scraper.timer /etc/systemd/system/
            sudo cp deploy/stfc-discord-bot.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable stfc-scraper.timer
            sudo systemctl enable stfc-discord-bot
            sudo systemctl restart stfc-discord-bot || true

            # Regenerate JSON data files from DB (ensures they exist after deploy)
            venv/bin/python -c "
            from db import get_db, export_latest_json, export_history_json, export_server_alliances_json, export_server_players_json, export_alliance_inventory_json
            conn = get_db(); export_latest_json(conn); export_history_json(conn); export_server_alliances_json(conn); export_server_players_json(conn); export_alliance_inventory_json(conn); conn.close()
            "

            # Only update nginx config + re-run certbot if the base config changed
            if ! diff -q deploy/stfc-nginx.conf /etc/nginx/sites-available/stfc.base > /dev/null 2>&1; then
              sudo cp deploy/stfc-nginx.conf /etc/nginx/sites-available/stfc.base
              sudo cp deploy/stfc-nginx.conf /etc/nginx/sites-available/stfc
              sudo certbot --nginx -d ncctracker.top -d www.ncctracker.top --non-interactive --redirect
            fi
            sudo nginx -t && sudo systemctl reload nginx
