<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=server?tab=players">
<title>Redirecting&hellip;</title>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const target = params.get('tab') === 'recruiting' ? 'server?tab=recruiting' : 'server?tab=players';
  window.location.replace(target);
})();
</script>
</head>
<body>
<p>Redirecting to <a href="server?tab=players">Server 724 Tracker</a>&hellip;</p>
</body>
</html>
