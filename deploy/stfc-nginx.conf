server {
    listen 80;
    server_name nws.stfcdrew.lol;

    root /opt/stfc;
    index index.html;

    # Dashboard pages (allows /player instead of /player.html)
    # no-cache ensures browsers revalidate after deploys
    location / {
        try_files $uri $uri.html $uri/ =404;
        add_header Cache-Control "no-cache";
    }

    # JSON data files
    location /data/ {
        alias /opt/stfc/data/;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    # ROE admin API
    location /api/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache";
    }

    # React ROE admin app
    location /roe-admin/ {
        alias /opt/stfc/roe_admin/dist/;
        try_files $uri $uri/ /roe-admin/index.html;
        add_header Cache-Control "no-cache";
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
    }
    location ~ \.(py|sh|bat|db|log|pem)$ {
        deny all;
    }
    location /browser_session/ {
        deny all;
    }
    location /deploy/ {
        deny all;
    }
    location /venv/ {
        deny all;
    }
}
