<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Tracker - NCC vs THC</title>
<link rel="stylesheet" href="lcars.css">
<style>
  /* Matchup subtitle */
  .matchup-subtitle {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    color: var(--text-mid);
    margin: 4px 0 8px;
    text-align: center;
    letter-spacing: 1px;
  }
  .matchup-subtitle .team-a { color: var(--lcars-teal); font-weight: 700; }
  .matchup-subtitle .team-b { color: var(--lcars-orange); font-weight: 700; }
  .matchup-subtitle .vs { color: var(--text-dim); margin: 0 8px; }

  /* Tab bar uses period-btn styling */
  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .tab-btn {
    background: rgba(255,153,51,0.06);
    border: 1px solid rgba(255,153,51,0.12);
    color: var(--lcars-gold);
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    font-family: 'Rajdhani', sans-serif;
    transition: all 0.15s;
  }
  .tab-btn:hover {
    border-color: var(--lcars-orange);
    color: var(--lcars-orange);
  }
  .tab-btn.active {
    background: var(--lcars-orange);
    color: var(--bg-deep);
    border-color: var(--lcars-orange);
    font-weight: 700;
  }

  /* Comparison bars */
  .compare-section {
    margin-bottom: 20px;
  }
  .compare-row {
    margin-bottom: 16px;
  }
  .compare-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .compare-label .advantage {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0;
    text-transform: none;
  }
  .advantage-a { background: rgba(102,204,204,0.12); color: var(--lcars-teal); }
  .advantage-b { background: rgba(255,153,51,0.12); color: var(--lcars-orange); }
  .advantage-tie { background: rgba(85,85,102,0.15); color: var(--text-dim); }

  .bar-pair {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .bar-tag {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    width: 40px;
    text-align: right;
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    background: rgba(255,153,51,0.06);
    border-radius: 4px;
    height: 24px;
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .bar-fill-a { background: var(--lcars-teal); }
  .bar-fill-b { background: var(--lcars-orange); }
  .bar-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    width: 80px;
    flex-shrink: 0;
  }
  .bar-value-a { color: var(--lcars-teal); }
  .bar-value-b { color: var(--lcars-orange); }

  /* Scorecard */
  .scorecard {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 32px;
    margin-bottom: 20px;
    padding: 20px;
    background: var(--bg-panel);
    border: 1px solid rgba(255,153,51,0.08);
    border-radius: var(--radius);
  }
  .scorecard-team {
    text-align: center;
  }
  .scorecard-tag {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem;
    font-weight: 900;
    letter-spacing: 2px;
  }
  .scorecard-tag-a { color: var(--lcars-teal); }
  .scorecard-tag-b { color: var(--lcars-orange); }
  .scorecard-name {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 2px;
    font-family: 'Share Tech Mono', monospace;
  }
  .scorecard-stat {
    font-family: 'Share Tech Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    margin-top: 4px;
  }
  .scorecard-divider {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem;
    color: var(--text-dim);
    font-weight: 700;
    letter-spacing: 2px;
  }

  /* Section headers */
  .section-header {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--lcars-orange);
    text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,153,51,0.08);
    margin-bottom: 12px;
    margin-top: 20px;
  }
  .section-header:first-child { margin-top: 0; }

  /* Dual tables */
  .dual-tables {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .dual-tables .table-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 6px;
    padding: 6px 12px;
    border-radius: 4px;
  }
  .table-label-a { color: var(--lcars-teal); background: rgba(102,204,204,0.08); border: 1px solid rgba(102,204,204,0.2); }
  .table-label-b { color: var(--lcars-orange); background: rgba(255,153,51,0.08); border: 1px solid rgba(255,153,51,0.2); }

  .empty {
    color: var(--text-dim);
    font-style: italic;
    padding: 20px 0;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
  }

  /* Login */
  .login-box {
    background: var(--bg-panel);
    border: 1px solid rgba(255,153,51,0.12);
    border-radius: var(--radius);
    padding: 40px;
    text-align: center;
    max-width: 360px;
    width: 100%;
  }
  .login-box h2 {
    font-family: 'Orbitron', sans-serif;
    color: var(--lcars-orange);
    font-size: 1.1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .login-box input {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-input);
    border: 1px solid rgba(255,153,51,0.12);
    border-radius: 4px;
    color: var(--text-bright);
    font-size: 1rem;
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 14px;
  }
  .login-box input:focus {
    outline: none;
    border-color: var(--lcars-orange);
  }
  .login-box button {
    width: 100%;
    padding: 10px;
    background: var(--lcars-orange);
    color: var(--bg-deep);
    border: none;
    border-radius: 4px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
  }
  .login-box button:hover { background: var(--lcars-gold); }
  .login-error {
    color: var(--lcars-red);
    font-size: 0.85rem;
    font-family: 'Share Tech Mono', monospace;
    margin-top: 10px;
    min-height: 1.2em;
  }

  @media (max-width: 600px) {
    .dual-tables { grid-template-columns: 1fr; }
    .scorecard { gap: 16px; }
    .scorecard-stat { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<!-- LCARS Top Bar -->
<div class="lcars-bar">
  <div class="lcars-cap"></div>
  <div class="lcars-title-block">
    <h1>War Tracker</h1>
    <span class="subtitle">NCC vs THC</span>
  </div>
  <div class="lcars-end"></div>
</div>

<div class="lcars-layout">
  <!-- Sidebar -->
  <div class="lcars-sidebar">
    <div class="seg seg-orange" style="height:80px"></div>
    <div class="seg seg-amber" style="height:40px"></div>
    <div class="seg seg-blue" style="height:60px"></div>
    <div class="seg seg-purple" style="height:30px"></div>
    <div class="seg seg-teal" style="height:50px"></div>
    <div class="seg seg-amber"></div>
  </div>

  <!-- Main Content -->
  <div class="lcars-main">
    <nav>
      <a href="index">Tracker</a>
      <a href="calendar">Calendar</a>
      <a href="server" class="nav-admin">Server <span class="nav-lock">&#128274;</span></a>
      <a href="leaderboard" class="nav-admin">Leaderboard <span class="nav-lock">&#128274;</span></a>
      <a href="ncc_thc_war" class="active">War Tracker</a>
      <a href="/roe-admin/" class="nav-admin">ROE Violations <span class="nav-lock">&#128274;</span></a>
      <a href="admin" class="nav-admin">Admin <span class="nav-lock">&#128274;</span></a>
    </nav>

    <div class="matchup-subtitle">
      <span class="team-a">NCC</span><span class="vs">vs</span><span class="team-b">THC</span>
    </div>
    <div class="updated" id="updated"></div>

    <div id="content">
      <div class="loading">Loading war tracker data...</div>
    </div>

    <footer id="footer-el">
      Data sourced from Scopely game APIs
    </footer>
  </div>
</div>

<script>
(function() {
  const $ = id => document.getElementById(id);
  const NCC_ID = '2616095065411838478';
  const THC_ID = '2589865078455427614';

  loadData();

  // --- Utilities ---
  function esc(s) {
    const el = document.createElement('span');
    el.textContent = s == null ? '' : String(s);
    return el.innerHTML;
  }

  function formatAbbr(n) {
    if (n == null) n = 0;
    if (n === 0) return '0';
    const abs = Math.abs(n);
    const sign = n < 0 ? '-' : '';
    let val, suf;
    if (abs >= 1e15)      { val = abs / 1e15; suf = 'Q'; }
    else if (abs >= 1e12) { val = abs / 1e12; suf = 'T'; }
    else if (abs >= 1e9)  { val = abs / 1e9;  suf = 'B'; }
    else if (abs >= 1e6)  { val = abs / 1e6;  suf = 'M'; }
    else if (abs >= 1e3)  { val = abs / 1e3;  suf = 'K'; }
    else                  { val = abs;         suf = '';  }
    return sign + val.toFixed(2).replace(/\.?0+$/, '') + suf;
  }

  function formatDelta(n) {
    if (n === 0) return '<span class="delta-zero">0</span>';
    const cls = n > 0 ? 'delta-pos' : 'delta-neg';
    const sign = n > 0 ? '+' : '';
    return `<span class="${cls}">${sign}${formatAbbr(n)}</span>`;
  }

  function gainCellHtml(current, delta) {
    if (delta === 0) {
      return `<span class="cell-delta-main delta-zero">0</span><span class="cell-sub">${formatAbbr(current)}</span>`;
    }
    const cls = delta > 0 ? 'delta-pos' : 'delta-neg';
    const sign = delta > 0 ? '+' : '';
    return `<span class="cell-delta-main ${cls}">${sign}${formatAbbr(delta)}</span><span class="cell-sub">${formatAbbr(current)}</span>`;
  }

  function playerLink(p) {
    return `<a class="player-link" href="player?id=${encodeURIComponent(p.id)}">${esc(p.name)}</a>`;
  }

  function periodLabel() {
    return period === 'war' ? 'War' : `${period}-Day`;
  }
  function periodShort() {
    return period === 'war' ? 'war' : `${period}d`;
  }

  function advantageLabel(va, vb) {
    if (va > vb) return '<span class="advantage advantage-a">NCC leads</span>';
    if (vb > va) return '<span class="advantage advantage-b">THC leads</span>';
    return '<span class="advantage advantage-tie">Tied</span>';
  }

  function comparisonBar(label, va, vb) {
    const maxVal = Math.max(Math.abs(va), Math.abs(vb), 1);
    const pctA = (Math.abs(va) / maxVal) * 100;
    const pctB = (Math.abs(vb) / maxVal) * 100;

    let html = '<div class="compare-row">';
    html += `<div class="compare-label">${label} ${advantageLabel(va, vb)}</div>`;
    html += '<div class="bar-pair">';

    html += '<div class="bar-row">';
    html += '<span class="bar-tag" style="color:var(--lcars-teal)">NCC</span>';
    html += `<div class="bar-track"><div class="bar-fill bar-fill-a" style="width:${pctA}%"></div></div>`;
    html += `<span class="bar-value bar-value-a">${formatAbbr(va)}</span>`;
    html += '</div>';

    html += '<div class="bar-row">';
    html += '<span class="bar-tag" style="color:var(--lcars-orange)">THC</span>';
    html += `<div class="bar-track"><div class="bar-fill bar-fill-b" style="width:${pctB}%"></div></div>`;
    html += `<span class="bar-value bar-value-b">${formatAbbr(vb)}</span>`;
    html += '</div>';

    html += '</div></div>';
    return html;
  }

  // --- State ---
  let allianceData = null;
  let playerData = null;
  let currentTab = 'combat';
  let period = 1;

  function loadData() {
    const t = Date.now();
    const ap = fetch('data/server_alliances.json?t=' + t)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
    const pp = fetch('data/server_players.json?t=' + t)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });

    Promise.all([ap, pp])
      .then(([a, p]) => {
        allianceData = a;
        playerData = p;
        const d = new Date(a.pulled_at);
        $('updated').textContent = 'Last updated: ' + d.toLocaleDateString('en-US', {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        renderPage();
      })
      .catch(err => {
        $('content').innerHTML = `<div class="loading error">Failed to load data: ${esc(err.message)}</div>`;
      });
  }

  function getAlliance(id) {
    return allianceData.alliances.find(a => a.alliance_id === id);
  }

  function getPlayers(allianceId) {
    return playerData.players.filter(p => p.alliance_id === allianceId);
  }

  function renderPage() {
    let html = '';

    // Period bar
    html += '<div class="period-bar">';
    for (const [d, label] of [[1, '1 Day'], [7, '7 Days'], [30, '30 Days'], ['war', 'Since War']]) {
      const cls = period === d ? ' active' : '';
      html += `<button class="period-btn${cls}" data-period="${d}">${label}</button>`;
    }
    html += '</div>';

    // Tab bar
    const tabs = [
      ['combat', 'Combat (PVP)'],
      ['activity', 'Activity (PVE)'],
      ['roster', 'Full Roster'],
    ];
    html += '<div class="tab-bar">';
    for (const [id, label] of tabs) {
      const cls = currentTab === id ? ' active' : '';
      html += `<button class="tab-btn${cls}" data-tab="${id}">${label}</button>`;
    }
    html += '</div>';

    html += '<div id="tab-content"></div>';
    $('content').innerHTML = html;

    // Period handlers
    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const v = btn.dataset.period;
        period = isNaN(v) ? v : parseInt(v);
        renderPage();
      });
    });

    // Tab handlers
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentTab = btn.dataset.tab;
        renderPage();
      });
    });

    renderTab();
  }

  function renderTab() {
    const el = document.getElementById('tab-content');
    if (!el) return;

    switch (currentTab) {
      case 'combat':   el.innerHTML = renderCombat();   break;
      case 'activity': el.innerHTML = renderActivity();  break;
      case 'roster':   el.innerHTML = renderRoster();    break;
    }
  }

  // ===== COMBAT (PVP) =====
  function renderCombat() {
    const ncc = getAlliance(NCC_ID);
    const thc = getAlliance(THC_ID);
    if (!ncc || !thc) return '<div class="empty">Alliance data not found</div>';

    const suf = period === 'war' ? '_delta_war' : `_delta_${period}d`;
    const nccPlayers = getPlayers(NCC_ID);
    const thcPlayers = getPlayers(THC_ID);

    // Alliance PVP scorecard
    const nccPvpDelta = ncc['total_pvp' + suf] || 0;
    const thcPvpDelta = thc['total_pvp' + suf] || 0;
    const nccRaidDelta = ncc['total_raided' + suf] || 0;
    const thcRaidDelta = thc['total_raided' + suf] || 0;
    let html = '';

    // Summary cards
    html += '<div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr))">';

    html += '<div class="card">';
    html += `<div class="label">NCC PVP Kills (${periodShort()})</div>`;
    html += `<div class="value" style="color:var(--lcars-teal)">${formatAbbr(nccPvpDelta)}</div>`;
    html += `<div class="delta">Total: ${formatAbbr(ncc.total_pvp)}</div>`;
    html += '</div>';

    html += '<div class="card">';
    html += `<div class="label">THC PVP Kills (${periodShort()})</div>`;
    html += `<div class="value" style="color:var(--lcars-orange)">${formatAbbr(thcPvpDelta)}</div>`;
    html += `<div class="delta">Total: ${formatAbbr(thc.total_pvp)}</div>`;
    html += '</div>';

    html += '<div class="card">';
    html += `<div class="label">NCC Raided (${periodShort()})</div>`;
    html += `<div class="value" style="color:var(--lcars-teal)">${formatAbbr(nccRaidDelta)}</div>`;
    html += `<div class="delta">Total: ${formatAbbr(ncc.total_raided)}</div>`;
    html += '</div>';

    html += '<div class="card">';
    html += `<div class="label">THC Raided (${periodShort()})</div>`;
    html += `<div class="value" style="color:var(--lcars-orange)">${formatAbbr(thcRaidDelta)}</div>`;
    html += `<div class="delta">Total: ${formatAbbr(thc.total_raided)}</div>`;
    html += '</div>';

    html += '</div>';

    // Comparison bars
    html += '<div class="compare-section">';
    html += comparisonBar(`PVP Kills (${periodShort()} gain)`, nccPvpDelta, thcPvpDelta);
    html += comparisonBar(`Resources Raided (${periodShort()} gain)`, nccRaidDelta, thcRaidDelta);
    html += '</div>';

    // Top PVP players from each side
    html += `<div class="section-header">Top PVP Players — ${periodLabel()} Gains</div>`;

    const pvpSort = (a, b) => (b['players_killed' + suf] || 0) - (a['players_killed' + suf] || 0);
    const topNcc = [...nccPlayers].sort(pvpSort).slice(0, 20);
    const topThc = [...thcPlayers].sort(pvpSort).slice(0, 20);

    html += '<div class="dual-tables">';
    html += '<div>';
    html += '<div class="table-label table-label-a">[NCC] Discovery</div>';
    html += pvpTable(topNcc, suf);
    html += '</div>';
    html += '<div>';
    html += '<div class="table-label table-label-b">[THC] The High Command</div>';
    html += pvpTable(topThc, suf);
    html += '</div>';
    html += '</div>';

    return html;
  }

  function pvpTable(players, suf) {
    let html = '<div class="table-wrap"><table><thead><tr>';
    html += '<th>#</th><th>Player</th><th>Lvl</th><th>PVP Kills</th><th>RSS Raided</th>';
    html += '</tr></thead><tbody>';

    for (let i = 0; i < players.length; i++) {
      const p = players[i];
      const pkDelta = p['players_killed' + suf] || 0;
      const rrDelta = p['resources_raided' + suf] || 0;
      if (pkDelta === 0 && rrDelta === 0) continue;

      html += '<tr>';
      html += `<td>${i + 1}</td>`;
      html += `<td>${playerLink(p)}</td>`;
      html += `<td>${p.level}</td>`;
      html += `<td>${gainCellHtml(p.players_killed || 0, pkDelta)}</td>`;
      html += `<td>${gainCellHtml(p.resources_raided || 0, rrDelta)}</td>`;
      html += '</tr>';
    }

    if (players.every(p => (p['players_killed' + suf] || 0) === 0 && (p['resources_raided' + suf] || 0) === 0)) {
      html += '<tr><td colspan="5" class="empty">No PVP activity</td></tr>';
    }

    html += '</tbody></table></div>';
    return html;
  }

  // ===== ACTIVITY (PVE) =====
  function renderActivity() {
    const ncc = getAlliance(NCC_ID);
    const thc = getAlliance(THC_ID);
    if (!ncc || !thc) return '<div class="empty">Alliance data not found</div>';

    const suf = period === 'war' ? '_delta_war' : `_delta_${period}d`;
    const nccPlayers = getPlayers(NCC_ID);
    const thcPlayers = getPlayers(THC_ID);

    const nccHkDelta = ncc['total_hk' + suf] || 0;
    const thcHkDelta = thc['total_hk' + suf] || 0;
    const nccMinedDelta = ncc['total_mined' + suf] || 0;
    const thcMinedDelta = thc['total_mined' + suf] || 0;

    let html = '';

    // Summary cards
    html += '<div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr))">';

    html += '<div class="card">';
    html += `<div class="label">NCC Hostiles Killed (${periodShort()})</div>`;
    html += `<div class="value" style="color:var(--lcars-teal)">${formatAbbr(nccHkDelta)}</div>`;
    html += `<div class="delta">Total: ${formatAbbr(ncc.total_hk)}</div>`;
    html += '</div>';

    html += '<div class="card">';
    html += `<div class="label">THC Hostiles Killed (${periodShort()})</div>`;
    html += `<div class="value" style="color:var(--lcars-orange)">${formatAbbr(thcHkDelta)}</div>`;
    html += `<div class="delta">Total: ${formatAbbr(thc.total_hk)}</div>`;
    html += '</div>';

    html += '<div class="card">';
    html += `<div class="label">NCC Mined (${periodShort()})</div>`;
    html += `<div class="value" style="color:var(--lcars-teal)">${formatAbbr(nccMinedDelta)}</div>`;
    html += `<div class="delta">Total: ${formatAbbr(ncc.total_mined)}</div>`;
    html += '</div>';

    html += '<div class="card">';
    html += `<div class="label">THC Mined (${periodShort()})</div>`;
    html += `<div class="value" style="color:var(--lcars-orange)">${formatAbbr(thcMinedDelta)}</div>`;
    html += `<div class="delta">Total: ${formatAbbr(thc.total_mined)}</div>`;
    html += '</div>';

    html += '</div>';

    // Comparison bars
    html += '<div class="compare-section">';
    html += comparisonBar(`Hostiles Killed (${periodShort()} gain)`, nccHkDelta, thcHkDelta);
    html += comparisonBar(`Resources Mined (${periodShort()} gain)`, nccMinedDelta, thcMinedDelta);
    html += '</div>';

    // Top PVE players
    html += `<div class="section-header">Top PVE Players — ${periodLabel()} Gains</div>`;

    const hkSort = (a, b) => (b['hostiles_killed' + suf] || 0) - (a['hostiles_killed' + suf] || 0);
    const topNcc = [...nccPlayers].sort(hkSort).slice(0, 20);
    const topThc = [...thcPlayers].sort(hkSort).slice(0, 20);

    html += '<div class="dual-tables">';
    html += '<div>';
    html += '<div class="table-label table-label-a">[NCC] Discovery</div>';
    html += pveTable(topNcc, suf);
    html += '</div>';
    html += '<div>';
    html += '<div class="table-label table-label-b">[THC] The High Command</div>';
    html += pveTable(topThc, suf);
    html += '</div>';
    html += '</div>';

    return html;
  }

  function pveTable(players, suf) {
    let html = '<div class="table-wrap"><table><thead><tr>';
    html += '<th>#</th><th>Player</th><th>Lvl</th><th>Hostiles Killed</th><th>RSS Mined</th>';
    html += '</tr></thead><tbody>';

    for (let i = 0; i < players.length; i++) {
      const p = players[i];
      const hkDelta = p['hostiles_killed' + suf] || 0;
      const minedDelta = p['resources_mined' + suf] || 0;
      if (hkDelta === 0 && minedDelta === 0) continue;

      html += '<tr>';
      html += `<td>${i + 1}</td>`;
      html += `<td>${playerLink(p)}</td>`;
      html += `<td>${p.level}</td>`;
      html += `<td>${gainCellHtml(p.hostiles_killed || 0, hkDelta)}</td>`;
      html += `<td>${gainCellHtml(p.resources_mined || 0, minedDelta)}</td>`;
      html += '</tr>';
    }

    if (players.every(p => (p['hostiles_killed' + suf] || 0) === 0 && (p['resources_mined' + suf] || 0) === 0)) {
      html += '<tr><td colspan="5" class="empty">No PVE activity</td></tr>';
    }

    html += '</tbody></table></div>';
    return html;
  }

  // ===== FULL ROSTER =====
  function renderRoster() {
    const nccPlayers = getPlayers(NCC_ID);
    const thcPlayers = getPlayers(THC_ID);
    const suf = period === 'war' ? '_delta_war' : `_delta_${period}d`;

    const sortByPower = (a, b) => (b.power || 0) - (a.power || 0);

    let html = `<div class="section-header">Full Roster Comparison — ${periodLabel()} Gains</div>`;
    html += '<div class="dual-tables">';

    html += '<div>';
    html += `<div class="table-label table-label-a">[NCC] Discovery — ${nccPlayers.length} members</div>`;
    html += rosterTable([...nccPlayers].sort(sortByPower), suf);
    html += '</div>';

    html += '<div>';
    html += `<div class="table-label table-label-b">[THC] The High Command — ${thcPlayers.length} members</div>`;
    html += rosterTable([...thcPlayers].sort(sortByPower), suf);
    html += '</div>';

    html += '</div>';
    return html;
  }

  function rosterTable(players, suf) {
    let html = '<div class="table-wrap" style="max-height:600px;overflow-y:auto"><table><thead><tr>';
    html += '<th>#</th><th>Player</th><th>Lvl</th><th>Power</th><th>PVP Kills</th><th>Hostiles</th><th>Mined</th><th>Raided</th>';
    html += '</tr></thead><tbody>';

    for (let i = 0; i < players.length; i++) {
      const p = players[i];
      html += '<tr>';
      html += `<td>${i + 1}</td>`;
      html += `<td>${playerLink(p)}</td>`;
      html += `<td>${p.level}</td>`;
      html += `<td>${gainCellHtml(p.power || 0, p['power' + suf] || 0)}</td>`;
      html += `<td>${gainCellHtml(p.players_killed || 0, p['players_killed' + suf] || 0)}</td>`;
      html += `<td>${gainCellHtml(p.hostiles_killed || 0, p['hostiles_killed' + suf] || 0)}</td>`;
      html += `<td>${gainCellHtml(p.resources_mined || 0, p['resources_mined' + suf] || 0)}</td>`;
      html += `<td>${gainCellHtml(p.resources_raided || 0, p['resources_raided' + suf] || 0)}</td>`;
      html += '</tr>';
    }

    html += '</tbody></table></div>';
    return html;
  }

})();
</script>
</body>
</html>
